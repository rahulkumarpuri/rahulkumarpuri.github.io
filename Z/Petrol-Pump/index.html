<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Indian Oil Shift Calculator</title>

<style>
*{
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
margin:0;
background:#0f172a;
color:#fff;
}

header{
background:linear-gradient(90deg,#ff7b00,#ff9800);
padding:20px;
font-size:28px;
font-weight:bold;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

h2{
margin-top:0;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.primary{
background:#ff9800;
color:#fff;
}

.danger{
background:#e53935;
color:#fff;
}

.success{
background:#4caf50;
color:#fff;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:700px){
.row{
grid-template-columns:1fr;
}
}

.list{
padding:10px;
background:#334155;
border-radius:12px;
margin-top:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #475569;
}

.badge{
background:#ff9800;
padding:5px 10px;
border-radius:10px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.tab{
background:#334155;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>
<body>

<header>
Indian Oil Shift Calculator
</header>

<div class="container">

<div class="tabs" id="tabs"></div>

<div class="card">

<h2>Shift Details</h2>

<label>Total Change Amount</label>
<input id="changeAmount" type="number">

<label>Opening Totaliser</label>
<input id="opening" type="number" step="0.001">

<label>Closing Totaliser</label>
<input id="closing" type="number" step="0.001">

<label>Fuel Rate / Litre</label>
<input id="rate" type="number">

<button class="primary" onclick="calculate()">Calculate</button>

<div id="result"></div>

</div>

<div class="card">

<h2>Add Entry</h2>

<input id="title" placeholder="Heading">

<input id="value" type="number" placeholder="Amount">

<select id="type">
<option value="+">Plus</option>
<option value="-">Minus</option>
</select>

<button class="success" onclick="addEntry()">Add</button>

<div id="entries"></div>

</div>

<div class="card">
<h2>Cash Status</h2>

<label>Current Cash In Hand</label>
<input id="cashInHand" type="number">

<label>UPI Received</label>
<input id="upi" type="number">

<label>Card Received</label>
<input id="card" type="number">

<button class="primary" onclick="calculateShort()">Check Short / Excess</button>

<div id="shortResult"></div>

</div>

<div class="card">
<button class="danger" onclick="resetAll()">Reset</button>
</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("entries")) || [];
let staffs = JSON.parse(localStorage.getItem("staffs")) || ["My Shift"];

function save(){
localStorage.setItem("entries",JSON.stringify(entries));
}

function calculate(){

let opening =
parseFloat(document.getElementById("opening").value)||0;

let closing =
parseFloat(document.getElementById("closing").value)||0;

let rate =
parseFloat(document.getElementById("rate").value)||0;

let litres = closing-opening;
let amount = litres*rate;

document.getElementById("result").innerHTML=`
<p>Total Selling In Litres:
<b>${litres.toFixed(3)} L</b></p>

<p>Total Selling Amount:
<b>₹${amount.toFixed(2)}</b></p>
`;
}

function addEntry(){

let title =
document.getElementById("title").value;

let value =
parseFloat(document.getElementById("value").value)||0;

let type =
document.getElementById("type").value;

entries.push({
title,
value,
type
});

save();
render();
}

function render(){

let html="";

entries.forEach((e,i)=>{

html += `
<div class="item">

<div>
<b>${e.title}</b><br>
${e.type}${e.value}
</div>

<div>
<button onclick="editEntry(${i})">✏️</button>
<button onclick="deleteEntry(${i})">❌</button>
</div>

</div>
`;

});

document.getElementById("entries").innerHTML=html;
}

function deleteEntry(i){
entries.splice(i,1);
save();
render();
}

function editEntry(i){

let v = prompt(
"New Amount",
entries[i].value
);

if(v!==null){
entries[i].value = parseFloat(v)||0;
save();
render();
}
}

function calculateShort(){

let opening =
parseFloat(document.getElementById("opening").value)||0;

let closing =
parseFloat(document.getElementById("closing").value)||0;

let rate =
parseFloat(document.getElementById("rate").value)||0;

let litres = closing-opening;
let sales = litres*rate;

let cash =
parseFloat(document.getElementById("cashInHand").value)||0;

let upi =
parseFloat(document.getElementById("upi").value)||0;

let card =
parseFloat(document.getElementById("card").value)||0;

let extra = 0;

entries.forEach(e=>{
if(e.type==="+")
extra += e.value;
else
extra -= e.value;
});

let actual =
cash+upi+card+extra;

let diff =
actual-sales;

let text =
diff>=0 ?
`Excess ₹${diff.toFixed(2)}` :
`Short ₹${Math.abs(diff).toFixed(2)}`;

document.getElementById("shortResult").innerHTML=
`<h2>${text}</h2>`;
}

function resetAll(){

if(confirm("Reset all data?")){

localStorage.clear();
location.reload();

}
}

render();

</script>

</body>
</html>
