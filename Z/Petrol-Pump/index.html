<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petrol Pump Calculator</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Segoe UI,sans-serif;
}
body{
    background:#111827;
    color:white;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
}
.card{
    background:#1f2937;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.4);
}
h1{
    text-align:center;
    margin-bottom:20px;
}
h2{
    margin-bottom:15px;
    color:#38bdf8;
}
label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
}
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#374151;
    color:white;
    font-size:16px;
}
.result{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
}
.green{
    color:#22c55e;
}
.red{
    color:#ef4444;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-size:16px;
    cursor:pointer;
}
.reset{
    background:#ef4444;
    color:white;
}
.rateBox{
    display:flex;
    gap:10px;
    align-items:center;
    margin-top:10px;
}
.rate{
    flex:1;
    background:#374151;
    padding:12px;
    border-radius:10px;
}
.edit{
    background:#0ea5e9;
    width:50px;
    height:50px;
    border-radius:10px;
    font-size:22px;
}
.total{
    font-size:28px;
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>⛽ Petrol Pump Calculator</h1>

<div class="card">
<h2>Fuel Rates</h2>

<div class="rateBox">
<div class="rate">
Petrol Rate : ₹ <span id="petrolRateText">0</span>
</div>
<button class="edit" onclick="editRate('petrol')">✏️</button>
</div>

<div class="rateBox">
<div class="rate">
Diesel Rate : ₹ <span id="dieselRateText">0</span>
</div>
<button class="edit" onclick="editRate('diesel')">✏️</button>
</div>

</div>

<div class="card">
<h2>Total Amount Collection</h2>

<label>Total Deposited</label>
<input type="number" id="deposit">

<label>Card Amount</label>
<input type="number" id="card">

<label>Net Balance</label>
<input type="number" id="balance">

<label>UPI Amount</label>
<input type="number" id="upi">

<div class="total">
Collection Total : ₹ <span id="collectionTotal">0</span>
</div>

</div>

<div class="card">

<h2>Petrol Sale</h2>

<label>Opening Totalizer</label>
<input type="number" id="petrolOpen">

<label>Closing Totalizer</label>
<input type="number" id="petrolClose">

<div class="result">
Sale Liter :
<span id="petrolLiter">0</span>
</div>

<div class="result">
Amount :
₹ <span id="petrolAmount">0</span>
</div>

</div>

<div class="card">

<h2>Diesel Sale</h2>

<label>Opening Totalizer</label>
<input type="number" id="dieselOpen">

<label>Closing Totalizer</label>
<input type="number" id="dieselClose">

<div class="result">
Sale Liter :
<span id="dieselLiter">0</span>
</div>

<div class="result">
Amount :
₹ <span id="dieselAmount">0</span>
</div>

</div>

<div class="card">

<h2>Final Result</h2>

<div class="result">
Total Sale :
₹ <span id="totalSale">0</span>
</div>

<div class="result" id="shortResult">
Short / Excess
</div>

<button class="reset" onclick="resetData()">Reset Calculation</button>

</div>

</div>

<script>

let petrolRate =
parseFloat(localStorage.getItem("petrolRate")) || 0;

let dieselRate =
parseFloat(localStorage.getItem("dieselRate")) || 0;

document.getElementById("petrolRateText").innerText = petrolRate;
document.getElementById("dieselRateText").innerText = dieselRate;

function editRate(type){

let current =
type=="petrol" ? petrolRate : dieselRate;

let value = prompt(
"Enter "+type+" rate",
current
);

if(value===null) return;

value = parseFloat(value);

if(isNaN(value)) return;

if(type=="petrol"){
    petrolRate = value;
    localStorage.setItem("petrolRate",value);
}else{
    dieselRate = value;
    localStorage.setItem("dieselRate",value);
}

document.getElementById("petrolRateText").innerText = petrolRate;
document.getElementById("dieselRateText").innerText = dieselRate;

calculate();

}

const inputs = document.querySelectorAll("input");

inputs.forEach(input=>{
    input.addEventListener("input",()=>{
        saveInputs();
        calculate();
    });
});

function saveInputs(){
    inputs.forEach(i=>{
        localStorage.setItem(i.id,i.value);
    });
}

function loadInputs(){
    inputs.forEach(i=>{
        i.value =
        localStorage.getItem(i.id) || "";
    });
}

function num(id){
    return parseFloat(
        document.getElementById(id).value
    ) || 0;
}

function calculate(){

let collection =
num("deposit")+
num("card")+
num("balance")+
num("upi");

document.getElementById(
"collectionTotal"
).innerText =
collection.toFixed(2);

let petrolLiter =
num("petrolClose")-
num("petrolOpen");

if(petrolLiter<0)
petrolLiter=0;

let petrolAmount =
petrolLiter*petrolRate;

document.getElementById(
"petrolLiter"
).innerText =
petrolLiter.toFixed(3);

document.getElementById(
"petrolAmount"
).innerText =
petrolAmount.toFixed(2);

let dieselLiter =
num("dieselClose")-
num("dieselOpen");

if(dieselLiter<0)
dieselLiter=0;

let dieselAmount =
dieselLiter*dieselRate;

document.getElementById(
"dieselLiter"
).innerText =
dieselLiter.toFixed(3);

document.getElementById(
"dieselAmount"
).innerText =
dieselAmount.toFixed(2);

let totalSale =
petrolAmount + dieselAmount;

document.getElementById(
"totalSale"
).innerText =
totalSale.toFixed(2);

let diff =
totalSale - collection;

let box =
document.getElementById(
"shortResult"
);

if(diff>0){
    box.innerHTML =
    "🔴 Short : ₹ "+
    diff.toFixed(2);
    box.className =
    "result red";
}
else if(diff<0){
    box.innerHTML =
    "🟢 Excess : ₹ "+
    Math.abs(diff).toFixed(2);
    box.className =
    "result green";
}
else{
    box.innerHTML =
    "✅ Perfect Match";
    box.className =
    "result";
}

}

function resetData(){

if(!confirm(
"Reset all calculation?"
)) return;

inputs.forEach(i=>{
    i.value="";
    localStorage.removeItem(i.id);
});

calculate();

}

loadInputs();
calculate();

if(
!localStorage.getItem("petrolRate")
){
    editRate("petrol");
}

if(
!localStorage.getItem("dieselRate")
){
    editRate("diesel");
}

</script>

</body>
</html>
