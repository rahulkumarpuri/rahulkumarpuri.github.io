<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indian Oil Short Excess Tracker</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.1rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --color-bg:#f7f6f2; --color-surface:#fbfbf9; --color-surface-2:#f3f0ec; --color-surface-3:#ece8e1; --color-border:#d4d1ca; --color-divider:#dcd9d5;
      --color-text:#28251d; --color-text-muted:#6f6d67; --color-text-faint:#a3a099; --color-text-inverse:#f9f8f4;
      --color-primary:#01696f; --color-primary-hover:#0c4e54; --color-primary-soft:#d7ece8; --color-success:#2e7d32; --color-success-soft:#dff0df; --color-error:#a13544; --color-error-soft:#f4d9dd; --color-warning:#b06b00; --color-warning-soft:#f6e7ca;
      --shadow-sm:0 1px 2px rgba(25,20,15,.06); --shadow-md:0 10px 30px rgba(25,20,15,.09); --shadow-lg:0 20px 50px rgba(25,20,15,.14);
      --radius-sm:.5rem; --radius-md:.9rem; --radius-lg:1.3rem; --radius-xl:1.7rem; --radius-full:999px;
      --font-body:'Satoshi', system-ui, sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:#131516; --color-surface:#1a1d1f; --color-surface-2:#202428; --color-surface-3:#282d31; --color-border:#31383d; --color-divider:#2a3035;
      --color-text:#edf0f2; --color-text-muted:#a8b1b7; --color-text-faint:#768089; --color-text-inverse:#0f1214;
      --color-primary:#4f98a3; --color-primary-hover:#66a9b2; --color-primary-soft:#183338; --color-success:#72c47b; --color-success-soft:#183321; --color-error:#ef7f92; --color-error-soft:#3c1d24; --color-warning:#f2be59; --color-warning-soft:#392c13;
      --shadow-sm:0 1px 3px rgba(0,0,0,.25); --shadow-md:0 16px 40px rgba(0,0,0,.28); --shadow-lg:0 22px 60px rgba(0,0,0,.42);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:none;text-size-adjust:none;scroll-behavior:smooth}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);background:
      radial-gradient(circle at top right, color-mix(in srgb, var(--color-primary) 17%, transparent), transparent 28%),
      radial-gradient(circle at bottom left, color-mix(in srgb, var(--color-warning) 12%, transparent), transparent 30%),
      linear-gradient(180deg, var(--color-bg), color-mix(in srgb, var(--color-bg) 88%, black 12%));
      color:var(--color-text);line-height:1.5}
    button,input,select{font:inherit;color:inherit}
    .app{max-width:1480px;margin:auto;padding:var(--space-6)}
    .glass{background:color-mix(in srgb, var(--color-surface) 78%, transparent);backdrop-filter:blur(18px);border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);box-shadow:var(--shadow-md)}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);padding:var(--space-5);border-radius:var(--radius-xl);margin-bottom:var(--space-6);position:sticky;top:12px;z-index:30}
    .brand{display:flex;gap:var(--space-4);align-items:center}
    .logo{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(145deg,var(--color-primary),color-mix(in srgb,var(--color-primary) 52%, #f68b1f 48%));color:white;box-shadow:var(--shadow-md)}
    .brand h1{font-size:var(--text-xl);line-height:1.05;font-weight:900;letter-spacing:-.03em}
    .brand p{color:var(--color-text-muted);font-size:var(--text-sm)}
    .top-actions{display:flex;gap:var(--space-3);flex-wrap:wrap}
    .btn{border:none;border-radius:var(--radius-full);padding:.85rem 1.15rem;min-height:44px;display:inline-flex;align-items:center;gap:.55rem;font-weight:700;cursor:pointer;transition:.18s ease;background:var(--color-surface-2);border:1px solid color-mix(in srgb,var(--color-border) 80%, transparent)}
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:var(--color-primary);color:var(--color-text-inverse);border-color:transparent}
    .btn.warn{background:var(--color-error);color:white;border-color:transparent}
    .shell{display:grid;grid-template-columns:290px 1fr;gap:var(--space-6)}
    .sidebar,.main-panel{border-radius:var(--radius-xl);padding:var(--space-5)}
    .sidebar{align-self:start;position:sticky;top:112px}
    .staff-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4)}
    .staff-list{display:flex;flex-direction:column;gap:var(--space-3);max-height:60dvh;overflow:auto;padding-right:4px}
    .staff-tab{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;padding:1rem;border-radius:1rem;border:1px solid color-mix(in srgb,var(--color-border) 80%, transparent);background:var(--color-surface-2);cursor:pointer}
    .staff-tab.active{background:linear-gradient(180deg,color-mix(in srgb,var(--color-primary) 18%, var(--color-surface-2)), var(--color-surface-2));border-color:color-mix(in srgb,var(--color-primary) 45%, var(--color-border));box-shadow:var(--shadow-sm)}
    .staff-tab small{display:block;color:var(--color-text-muted);font-size:var(--text-xs)}
    .staff-actions{display:flex;gap:var(--space-2)}
    .icon-btn{width:40px;height:40px;border-radius:999px;display:grid;place-items:center;border:1px solid color-mix(in srgb,var(--color-border) 80%, transparent);background:var(--color-surface-2);cursor:pointer}
    .main-grid{display:grid;gap:var(--space-5)}
    .hero-grid{display:grid;grid-template-columns:1.35fr .95fr;gap:var(--space-5)}
    .card{background:linear-gradient(180deg,color-mix(in srgb,var(--color-surface) 88%, transparent),color-mix(in srgb,var(--color-surface-2) 96%, transparent));border:1px solid color-mix(in srgb,var(--color-border) 82%, transparent);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);overflow:hidden}
    .card-head{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);padding:var(--space-5);border-bottom:1px solid var(--color-divider)}
    .card-head h2{font-size:var(--text-lg);font-weight:900;letter-spacing:-.02em}
    .card-head p{color:var(--color-text-muted);font-size:var(--text-sm)}
    .card-body{padding:var(--space-5)}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4)}
    .metric{padding:1.05rem;border-radius:1.2rem;background:var(--color-surface-2);border:1px solid color-mix(in srgb,var(--color-border) 75%, transparent)}
    .metric span{display:block;color:var(--color-text-muted);font-size:var(--text-xs);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
    .metric strong{font-size:clamp(1.2rem,1rem + 1vw,2rem);font-variant-numeric:tabular-nums lining-nums;line-height:1.05}
    .metric.good{background:linear-gradient(180deg,color-mix(in srgb,var(--color-success) 12%, var(--color-surface-2)),var(--color-surface-2))}
    .metric.bad{background:linear-gradient(180deg,color-mix(in srgb,var(--color-error) 12%, var(--color-surface-2)),var(--color-surface-2))}
    .metric.warnm{background:linear-gradient(180deg,color-mix(in srgb,var(--color-warning) 12%, var(--color-surface-2)),var(--color-surface-2))}
    .section-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-5)}
    .field-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-4)}
    .field{display:grid;gap:8px}
    .field label{font-size:var(--text-sm);font-weight:700}
    .hint{font-size:var(--text-xs);color:var(--color-text-muted)}
    .input-wrap{position:relative}
    input,select{width:100%;min-height:48px;padding:.9rem 1rem;border-radius:1rem;border:1px solid color-mix(in srgb,var(--color-border) 78%, transparent);background:var(--color-surface-2);outline:none}
    input:focus,select:focus{border-color:var(--color-primary);box-shadow:0 0 0 4px color-mix(in srgb,var(--color-primary) 20%, transparent)}
    .inline-edit{display:flex;gap:var(--space-2);align-items:center}
    .inline-edit .edit-value{flex:1;padding:.9rem 1rem;border-radius:1rem;background:var(--color-surface-2);border:1px solid color-mix(in srgb,var(--color-border) 78%, transparent);font-variant-numeric:tabular-nums lining-nums}
    .pill{display:inline-flex;align-items:center;gap:.5rem;padding:.45rem .8rem;border-radius:999px;background:var(--color-primary-soft);color:var(--color-primary);font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:.07em}
    .list-stack{display:grid;gap:var(--space-3)}
    .entry{display:grid;grid-template-columns:1fr auto auto;gap:var(--space-3);align-items:center;padding:1rem;border-radius:1rem;background:var(--color-surface-2);border:1px solid color-mix(in srgb,var(--color-border) 75%, transparent)}
    .entry-title{font-weight:800}
    .entry-sub{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:4px}
    .amount{font-weight:900;font-variant-numeric:tabular-nums lining-nums}
    .amount.plus{color:var(--color-success)}
    .amount.minus{color:var(--color-error)}
    .empty{padding:1rem;border:1px dashed color-mix(in srgb,var(--color-border) 80%, transparent);border-radius:1rem;color:var(--color-text-muted);text-align:center;background:color-mix(in srgb,var(--color-surface-2) 75%, transparent)}
    .toolbar{display:flex;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap;margin-bottom:var(--space-4)}
    .mini-form{display:grid;grid-template-columns:1.15fr .9fr auto;gap:var(--space-3)}
    .mini-form.four{grid-template-columns:1.2fr .7fr .7fr auto}
    .result-box{display:grid;gap:var(--space-3);padding:var(--space-5);height:100%;background:linear-gradient(180deg,color-mix(in srgb,var(--color-primary) 10%, var(--color-surface)),var(--color-surface-2))}
    .result-main{display:flex;justify-content:space-between;align-items:flex-end;gap:var(--space-4);padding:var(--space-4);border-radius:1.2rem;background:color-mix(in srgb,var(--color-surface-2) 88%, transparent);border:1px solid color-mix(in srgb,var(--color-border) 72%, transparent)}
    .result-main h3{font-size:var(--text-sm);text-transform:uppercase;letter-spacing:.12em;color:var(--color-text-muted)}
    .result-main strong{font-size:clamp(1.8rem,1.4rem + 2vw,3rem);font-weight:900;font-variant-numeric:tabular-nums lining-nums}
    .result-chip{display:inline-flex;align-items:center;justify-content:center;padding:.55rem .9rem;border-radius:999px;font-size:var(--text-sm);font-weight:900}
    .chip-good{background:var(--color-success-soft);color:var(--color-success)}
    .chip-bad{background:var(--color-error-soft);color:var(--color-error)}
    .chip-even{background:var(--color-warning-soft);color:var(--color-warning)}
    .formula{padding:var(--space-4);border-radius:1rem;background:var(--color-surface-2);color:var(--color-text-muted);font-size:var(--text-sm)}
    .subtle{color:var(--color-text-muted)}
    .footer-note{padding:var(--space-4);text-align:center;color:var(--color-text-muted);font-size:var(--text-sm)}
    .grid-full{grid-column:1/-1}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:var(--space-4);z-index:60}
    .modal-backdrop.open{display:flex}
    .modal{width:min(700px,100%);border-radius:1.5rem;overflow:hidden}
    .modal .card-body{display:grid;gap:var(--space-4)}
    .right{display:flex;justify-content:flex-end;gap:var(--space-3);flex-wrap:wrap}
    .statusline{display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center}
    .tag{padding:.35rem .7rem;border-radius:999px;background:var(--color-surface-2);border:1px solid color-mix(in srgb,var(--color-border) 80%, transparent);font-size:var(--text-xs);color:var(--color-text-muted)}
    @media (max-width:1180px){.shell,.hero-grid,.section-grid{grid-template-columns:1fr}.sidebar{position:relative;top:auto}.metrics{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:780px){.app{padding:var(--space-4)}.topbar{padding:var(--space-4)}.field-grid,.mini-form,.mini-form.four{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}.entry{grid-template-columns:1fr auto}.entry .staff-actions{grid-column:1/-1;justify-content:flex-end}.brand h1{font-size:1.35rem}.logo{width:48px;height:48px}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar glass">
      <div class="brand">
        <div class="logo" aria-label="Indian Oil logo style mark">
          <svg width="30" height="30" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="32" cy="32" r="25" stroke="currentColor" stroke-width="6" opacity=".95"/>
            <path d="M32 13c5.6 7.8 8.4 14.5 8.4 20.1 0 6.3-3.8 11.3-8.4 11.3s-8.4-5-8.4-11.3C23.6 27.5 26.4 20.8 32 13Z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1>Indian Oil Shift Tracker</h1>
          <p>Short / Excess check for petrol pump staff</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn" id="themeToggle" aria-label="Toggle theme">🌙 Theme</button>
        <button class="btn" id="addStaffBtn">＋ Add staff</button>
        <button class="btn warn" id="resetAllBtn">Reset all</button>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar glass">
        <div class="staff-head">
          <div>
            <div class="pill">Multiple tab support</div>
          </div>
        </div>
        <div class="staff-list" id="staffList"></div>
        <div class="footer-note">Data stays saved for 24 hours after refresh or back.</div>
      </aside>

      <main class="main-panel glass">
        <div id="appRoot"></div>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="staffModal">
    <div class="modal card">
      <div class="card-head">
        <div>
          <h2>Add staff tab</h2>
          <p>Track short/excess separately for each staff member.</p>
        </div>
        <button class="icon-btn" onclick="closeStaffModal()">✕</button>
      </div>
      <div class="card-body">
        <div class="field">
          <label for="staffNameInput">Staff name</label>
          <input id="staffNameInput" type="text" placeholder="Example: Rahul / Night Shift" />
        </div>
        <div class="right">
          <button class="btn" onclick="closeStaffModal()">Cancel</button>
          <button class="btn primary" onclick="createStaffFromModal()">Create</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TTL = 24 * 60 * 60 * 1000;
    const STORAGE_KEY = 'indianOilShortExcessTrackerV1';

    const makeEntry = (title, value = 0, sign = 'minus') => ({
      id: crypto.randomUUID(),
      title,
      value: Number(value) || 0,
      sign,
      createdAt: new Date().toISOString()
    });

    const defaultStaff = (name = 'Staff 1') => ({
      id: crypto.randomUUID(),
      name,
      base: {
        companyChangeStart: 0,
        openingTotaliser: 0,
        closingTotaliser: 0,
        ratePerLitre: 0,
        currentCash: 0,
        onlineUpi: 0,
        card: 0,
        returnedChange: 'no'
      },
      groups: {
        givenToStaff: [],
        takenFromStaff: [],
        depositedToManager: [],
        others: []
      }
    });

    let state = loadState();

    function loadState(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw){
          const fresh = { savedAt: Date.now(), activeStaffId: null, staff: [defaultStaff('My Shift')] };
          fresh.activeStaffId = fresh.staff[0].id;
          return fresh;
        }
        const parsed = JSON.parse(raw);
        if(!parsed.savedAt || Date.now() - parsed.savedAt > TTL) {
          localStorage.removeItem(STORAGE_KEY);
          const fresh = { savedAt: Date.now(), activeStaffId: null, staff: [defaultStaff('My Shift')] };
          fresh.activeStaffId = fresh.staff[0].id;
          return fresh;
        }
        if(!parsed.staff?.length){
          parsed.staff = [defaultStaff('My Shift')];
          parsed.activeStaffId = parsed.staff[0].id;
        }
        return parsed;
      } catch {
        return { savedAt: Date.now(), activeStaffId: null, staff: [defaultStaff('My Shift')] };
      }
    }

    function saveState(){
      state.savedAt = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getActiveStaff(){
      return state.staff.find(s => s.id === state.activeStaffId) || state.staff[0];
    }

    function formatMoney(value){
      return '₹' + Number(value || 0).toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
    }

    function formatNumber(value, digits = 3){
      return Number(value || 0).toLocaleString('en-IN', { minimumFractionDigits: digits, maximumFractionDigits: digits });
    }

    function sumSigned(entries, negativeSign = 'minus'){
      return entries.reduce((sum, item) => sum + (item.sign === negativeSign ? -Number(item.value || 0) : Number(item.value || 0)), 0);
    }

    function calc(staff){
      const b = staff.base;
      const litres = Math.max(0, Number(b.closingTotaliser || 0) - Number(b.openingTotaliser || 0));
      const fuelAmount = litres * Number(b.ratePerLitre || 0);
      const returnedChangeAmount = b.returnedChange === 'yes' ? Number(b.companyChangeStart || 0) : 0;
      const given = staff.groups.givenToStaff.reduce((s, x) => s + Number(x.value || 0), 0);
      const taken = staff.groups.takenFromStaff.reduce((s, x) => s + Number(x.value || 0), 0);
      const deposited = staff.groups.depositedToManager.reduce((s, x) => s + Number(x.value || 0), 0);
      const othersNet = sumSigned(staff.groups.others, 'minus');
      const expected = fuelAmount + Number(b.companyChangeStart || 0) + taken + othersNet - given - deposited - returnedChangeAmount;
      const actual = Number(b.currentCash || 0) + Number(b.onlineUpi || 0) + Number(b.card || 0);
      const diff = actual - expected;
      return { litres, fuelAmount, returnedChangeAmount, given, taken, deposited, othersNet, expected, actual, diff };
    }

    function render(){
      renderStaffList();
      renderMain();
      saveState();
    }

    function renderStaffList(){
      const wrap = document.getElementById('staffList');
      wrap.innerHTML = '';
      state.staff.forEach((staff, index) => {
        const stats = calc(staff);
        const btn = document.createElement('button');
        btn.className = 'staff-tab ' + (staff.id === state.activeStaffId ? 'active' : '');
        btn.onclick = () => { state.activeStaffId = staff.id; render(); };
        btn.innerHTML = `
          <div>
            <strong>${escapeHtml(staff.name)}</strong>
            <small>${stats.diff > 0 ? 'Excess' : stats.diff < 0 ? 'Short' : 'Balanced'} · ${formatMoney(Math.abs(stats.diff))}</small>
          </div>
          <div class="staff-actions">
            <span class="tag">${index + 1}</span>
          </div>`;
        wrap.appendChild(btn);
      });
    }

    function renderMain(){
      const staff = getActiveStaff();
      const stats = calc(staff);
      const diffState = stats.diff > 0 ? 'excess' : stats.diff < 0 ? 'short' : 'balanced';
      const root = document.getElementById('appRoot');
      root.innerHTML = `
        <div class="main-grid">
          <section class="hero-grid">
            <div class="card">
              <div class="card-head">
                <div>
                  <h2>${escapeHtml(staff.name)}</h2>
                  <p>Enter shift details, money flow, and final collections.</p>
                </div>
                <div class="statusline">
                  <span class="tag">24h cache active</span>
                  <span class="tag">Editable records</span>
                </div>
              </div>
              <div class="card-body">
                <div class="metrics">
                  <div class="metric">
                    <span>Total litres sold</span>
                    <strong>${formatNumber(stats.litres, 3)}</strong>
                  </div>
                  <div class="metric">
                    <span>Fuel sale amount</span>
                    <strong>${formatMoney(stats.fuelAmount)}</strong>
                  </div>
                  <div class="metric warnm">
                    <span>Expected collection</span>
                    <strong>${formatMoney(stats.expected)}</strong>
                  </div>
                  <div class="metric ${stats.diff > 0 ? 'good' : stats.diff < 0 ? 'bad' : 'warnm'}">
                    <span>${diffState === 'excess' ? 'Excess amount' : diffState === 'short' ? 'Short amount' : 'Difference'}</span>
                    <strong>${formatMoney(Math.abs(stats.diff))}</strong>
                  </div>
                </div>
              </div>
            </div>
            <div class="card">
              <div class="result-box">
                <div class="result-main">
                  <div>
                    <h3>Final status</h3>
                    <strong>${formatMoney(Math.abs(stats.diff))}</strong>
                  </div>
                  <div class="result-chip ${stats.diff > 0 ? 'chip-good' : stats.diff < 0 ? 'chip-bad' : 'chip-even'}">${diffState.toUpperCase()}</div>
                </div>
                <div class="formula">Formula: Actual money (cash + UPI + card) minus expected collection. Expected collection includes fuel sale, opening change, taken/given, deposits, returned change, and custom others entries.</div>
                <div class="subtle">Tip: “Others” me aap custom heading ke sath plus ya minus amount add kar sakte ho, jaise customer debt return +200 ya udhaar -200.</div>
              </div>
            </div>
          </section>

          <section class="section-grid">
            <div class="card">
              <div class="card-head">
                <div>
                  <h2>Shift inputs</h2>
                  <p>Base values yaha se control honge.</p>
                </div>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  ${numberField('companyChangeStart','Total change amount provided by company at start of shift',staff.base.companyChangeStart,'0')}
                  ${numberField('ratePerLitre','Rate per litre',staff.base.ratePerLitre,'0')}
                  ${editableDisplay('openingTotaliser','Opening Totaliser',staff.base.openingTotaliser,3)}
                  ${editableDisplay('closingTotaliser','Closing Totaliser',staff.base.closingTotaliser,3)}
                  <div class="field">
                    <label>Total selling in liter</label>
                    <div class="edit-value">${formatNumber(stats.litres,3)}</div>
                    <div class="hint">Closing Totaliser - Opening Totaliser</div>
                  </div>
                  <div class="field">
                    <label>Total selling in amount</label>
                    <div class="edit-value">${formatMoney(stats.fuelAmount)}</div>
                    <div class="hint">Total litre × Rate per litre</div>
                  </div>
                  <div class="field">
                    <label for="returnedChange">Did you return the change amount?</label>
                    <select id="returnedChange" onchange="updateBase('returnedChange', this.value)">
                      <option value="no" ${staff.base.returnedChange === 'no' ? 'selected' : ''}>No</option>
                      <option value="yes" ${staff.base.returnedChange === 'yes' ? 'selected' : ''}>Yes</option>
                    </select>
                    <div class="hint">If yes, opening change amount expected cash se minus hoga.</div>
                  </div>
                  ${numberField('currentCash','How much money remains now in cash/coin?',staff.base.currentCash,'0')}
                  ${numberField('onlineUpi','How much money received in Online UPI payment?',staff.base.onlineUpi,'0')}
                  ${numberField('card','How much money received by Card?',staff.base.card,'0')}
                  <div class="field">
                    <label>Quick actions</label>
                    <div class="statusline">
                      <button class="btn" onclick="renameActiveStaff()">✏ Rename tab</button>
                      <button class="btn warn" onclick="deleteActiveStaff()">🗑 Delete tab</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-head">
                <div>
                  <h2>Collection view</h2>
                  <p>Live summary of this shift.</p>
                </div>
              </div>
              <div class="card-body">
                <div class="metrics">
                  <div class="metric"><span>Cash now</span><strong>${formatMoney(staff.base.currentCash)}</strong></div>
                  <div class="metric"><span>UPI</span><strong>${formatMoney(staff.base.onlineUpi)}</strong></div>
                  <div class="metric"><span>Card</span><strong>${formatMoney(staff.base.card)}</strong></div>
                  <div class="metric"><span>Actual total</span><strong>${formatMoney(stats.actual)}</strong></div>
                </div>
                <div style="height:16px"></div>
                <div class="metrics">
                  <div class="metric"><span>Taken from staff</span><strong>${formatMoney(stats.taken)}</strong></div>
                  <div class="metric"><span>Given to staff</span><strong>${formatMoney(stats.given)}</strong></div>
                  <div class="metric"><span>Deposited</span><strong>${formatMoney(stats.deposited)}</strong></div>
                  <div class="metric"><span>Others net</span><strong>${stats.othersNet < 0 ? '-' : ''}${formatMoney(Math.abs(stats.othersNet))}</strong></div>
                </div>
              </div>
            </div>
          </section>

          ${renderGroupCard('givenToStaff','Have you given any cash/coin to other staff and how much?','Add given entry','minus',staff.groups.givenToStaff,'This always reduces your expected collection.')}
          ${renderGroupCard('takenFromStaff','Have you taken any cash/coin from other staff and how much?','Add taken entry','plus',staff.groups.takenFromStaff,'This adds to your expected collection.')}
          ${renderGroupCard('depositedToManager','Have you deposited any amount to manager? And how much?','Add deposit entry','minus',staff.groups.depositedToManager,'Multiple deposits allowed: morning, noon, evening, night.')}
          ${renderOthersCard(staff.groups.others)}
        </div>
      `;
    }

    function numberField(key, label, value, placeholder){
      return `<div class="field"><label for="${key}">${label}</label><input id="${key}" type="number" step="0.001" placeholder="${placeholder}" value="${value ?? ''}" oninput="updateBase('${key}', this.value)" /></div>`;
    }

    function editableDisplay(key, label, value, digits){
      const shown = Number(value || 0).toLocaleString('en-IN', { minimumFractionDigits: digits, maximumFractionDigits: digits });
      return `<div class="field"><label>${label}</label><div class="inline-edit"><div class="edit-value">${shown}</div><button class="icon-btn" title="Edit ${label}" onclick="editBasePrompt('${key}','${label}', ${Number(value || 0)})">✏</button></div><div class="hint">Pencil icon se baad me edit kar sakte ho.</div></div>`;
    }

    function renderGroupCard(groupKey, title, btnText, sign, items, helpText){
      return `
        <section class="card grid-full">
          <div class="card-head">
            <div>
              <h2>${title}</h2>
              <p>${helpText}</p>
            </div>
          </div>
          <div class="card-body">
            <div class="toolbar">
              <div class="pill">Multiple entries allowed</div>
              <div class="mini-form">
                <input id="${groupKey}_title" type="text" placeholder="Heading / note" />
                <input id="${groupKey}_value" type="number" step="0.01" placeholder="Amount" />
                <button class="btn primary" onclick="addEntry('${groupKey}','${sign}')">${btnText}</button>
              </div>
            </div>
            <div class="list-stack">${renderEntries(groupKey, items)}</div>
          </div>
        </section>`;
    }

    function renderOthersCard(items){
      return `
        <section class="card grid-full">
          <div class="card-head">
            <div>
              <h2>Others</h2>
              <p>Custom heading add karo aur choose karo value plus me jayegi ya minus me.</p>
            </div>
          </div>
          <div class="card-body">
            <div class="toolbar">
              <div class="pill">Debt return / udhaar / misc</div>
              <div class="mini-form four">
                <input id="others_title" type="text" placeholder="Example: customer paid his debt" />
                <input id="others_value" type="number" step="0.01" placeholder="Amount" />
                <select id="others_sign">
                  <option value="plus">Plus (+)</option>
                  <option value="minus">Minus (-)</option>
                </select>
                <button class="btn primary" onclick="addEntry('others', document.getElementById('others_sign').value)">Add others</button>
              </div>
            </div>
            <div class="list-stack">${renderEntries('others', items)}</div>
          </div>
        </section>`;
    }

    function renderEntries(groupKey, items){
      if(!items.length) return `<div class="empty">Abhi koi entry nahi add ki gayi.</div>`;
      return items.map(item => `
        <div class="entry">
          <div>
            <div class="entry-title">${escapeHtml(item.title)}</div>
            <div class="entry-sub">${new Date(item.createdAt).toLocaleString('en-IN')}</div>
          </div>
          <div class="amount ${item.sign === 'plus' ? 'plus' : 'minus'}">${item.sign === 'plus' ? '+' : '-'}${formatMoney(item.value)}</div>
          <div class="staff-actions">
            <button class="icon-btn" title="Edit" onclick="editEntry('${groupKey}','${item.id}')">✏</button>
            <button class="icon-btn" title="Delete" onclick="deleteEntry('${groupKey}','${item.id}')">✕</button>
          </div>
        </div>`).join('');
    }

    function updateBase(key, value){
      const staff = getActiveStaff();
      staff.base[key] = ['returnedChange'].includes(key) ? value : Number(value || 0);
      render();
    }

    function editBasePrompt(key, label, current){
      const val = prompt(`Edit ${label}`, current ?? 0);
      if(val === null) return;
      updateBase(key, Number(val));
    }

    function addEntry(groupKey, sign){
      const titleEl = document.getElementById(groupKey + '_title');
      const valueEl = document.getElementById(groupKey + '_value');
      const title = (titleEl?.value || '').trim() || defaultTitle(groupKey);
      const value = Number(valueEl?.value || 0);
      if(!(value > 0)) return alert('Please enter a valid amount greater than 0.');
      const staff = getActiveStaff();
      staff.groups[groupKey].unshift(makeEntry(title, value, sign));
      if(titleEl) titleEl.value = '';
      if(valueEl) valueEl.value = '';
      if(groupKey === 'others') document.getElementById('others_sign').value = 'plus';
      render();
    }

    function defaultTitle(groupKey){
      return {
        givenToStaff: 'Cash given to staff',
        takenFromStaff: 'Cash taken from staff',
        depositedToManager: 'Cash deposited to manager',
        others: 'Other adjustment'
      }[groupKey] || 'Entry';
    }

    function editEntry(groupKey, entryId){
      const staff = getActiveStaff();
      const entry = staff.groups[groupKey].find(x => x.id === entryId);
      if(!entry) return;
      const title = prompt('Edit heading', entry.title);
      if(title === null) return;
      const value = prompt('Edit amount', entry.value);
      if(value === null) return;
      entry.title = title.trim() || entry.title;
      entry.value = Number(value || entry.value);
      if(groupKey === 'others'){
        const sign = prompt('Type plus or minus', entry.sign);
        if(sign && ['plus','minus'].includes(sign.toLowerCase())) entry.sign = sign.toLowerCase();
      }
      render();
    }

    function deleteEntry(groupKey, entryId){
      const staff = getActiveStaff();
      staff.groups[groupKey] = staff.groups[groupKey].filter(x => x.id !== entryId);
      render();
    }

    function openStaffModal(){ document.getElementById('staffModal').classList.add('open'); document.getElementById('staffNameInput').focus(); }
    function closeStaffModal(){ document.getElementById('staffModal').classList.remove('open'); document.getElementById('staffNameInput').value = ''; }
    function createStaffFromModal(){
      const input = document.getElementById('staffNameInput');
      const name = input.value.trim() || `Staff ${state.staff.length + 1}`;
      const s = defaultStaff(name);
      state.staff.push(s);
      state.activeStaffId = s.id;
      closeStaffModal();
      render();
    }

    function renameActiveStaff(){
      const staff = getActiveStaff();
      const name = prompt('Rename staff tab', staff.name);
      if(name && name.trim()) { staff.name = name.trim(); render(); }
    }

    function deleteActiveStaff(){
      if(state.staff.length === 1) return alert('At least one staff tab is required.');
      if(!confirm('Delete this staff tab?')) return;
      state.staff = state.staff.filter(s => s.id !== state.activeStaffId);
      state.activeStaffId = state.staff[0].id;
      render();
    }

    function resetAll(){
      if(!confirm('Reset complete tracker data?')) return;
      localStorage.removeItem(STORAGE_KEY);
      state = { savedAt: Date.now(), activeStaffId: null, staff: [defaultStaff('My Shift')] };
      state.activeStaffId = state.staff[0].id;
      render();
    }

    function escapeHtml(str){
      return String(str ?? '').replace(/[&<>"]+/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[ch] || ch));
    }

    document.getElementById('addStaffBtn').addEventListener('click', openStaffModal);
    document.getElementById('resetAllBtn').addEventListener('click', resetAll);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const root = document.documentElement;
      root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    document.getElementById('staffModal').addEventListener('click', (e) => { if(e.target.id === 'staffModal') closeStaffModal(); });

    if(!state.activeStaffId) state.activeStaffId = state.staff[0].id;
    render();
  </script>
</body>
</html>
