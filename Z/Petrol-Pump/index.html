<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fuel Sale Calculator</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
min-height:100vh;
padding:20px;
color:#fff;
}

.container{
max-width:850px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:34px;
}

.subtitle{
text-align:center;
opacity:.7;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.12);
padding:22px;
border-radius:28px;
margin-bottom:22px;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

h2{
margin-bottom:18px;
color:#38bdf8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

@media(max-width:650px){
.grid{
grid-template-columns:1fr;
}
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
color:#cbd5e1;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:rgba(255,255,255,.08);
color:white;
font-size:17px;
outline:none;
}

input:focus{
box-shadow:0 0 0 2px #38bdf8;
}

.rate-box{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:rgba(255,255,255,.06);
border-radius:18px;
margin-bottom:15px;
}

.edit{
background:#0ea5e9;
border:none;
width:45px;
height:45px;
border-radius:14px;
font-size:20px;
cursor:pointer;
color:#fff;
}

.result-box{
background:rgba(255,255,255,.06);
padding:18px;
border-radius:20px;
margin-top:15px;
font-size:20px;
font-weight:600;
}

.big{
font-size:30px;
text-align:center;
color:#facc15;
}

.short{
color:#ef4444;
}

.excess{
color:#22c55e;
}

.reset{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#ef4444;
color:#fff;
font-size:17px;
cursor:pointer;
margin-top:20px;
}

.badge{
display:inline-block;
padding:8px 18px;
background:#22c55e33;
border-radius:30px;
margin-bottom:20px;
}

.center{
text-align:center;
}
</style></head><body><div class="container"><h1>⛽ Fuel Sale Calculator</h1><div class="center">
<span class="badge">⚡ Auto Save Enabled</span>
</div><div class="card">
<h2>Fuel Rates</h2><div class="rate-box">
<div>Petrol Rate : ₹ <span id="petrolRateText">0</span></div>
<button class="edit" onclick="editRate('petrol')">✏️</button>
</div><div class="rate-box">
<div>Diesel Rate : ₹ <span id="dieselRateText">0</span></div>
<button class="edit" onclick="editRate('diesel')">✏️</button>
</div>
</div><div class="card">
<h2>Collection Amount</h2><div class="grid"><div>
<label>Total Deposited</label>
<input id="deposit" type="number">
</div><div>
<label>Card Amount</label>
<input id="card" type="number">
</div><div>
<label>Net Balance</label>
<input id="balance" type="number">
</div><div>
<label>UPI Amount</label>
<input id="upi" type="number">
</div></div><div class="result-box big">
₹ <span id="collectionTotal">0.00</span>
</div>
</div><div class="card">
<h2>Petrol Sale</h2><div class="grid">
<div>
<label>Opening Totalizer</label>
<input id="petrolOpen" type="number">
</div><div>
<label>Closing Totalizer</label>
<input id="petrolClose" type="number">
</div>
</div><div class="result-box">
Sale Liter :
<span id="petrolLiter">0</span>
</div><div class="result-box">
Amount :
₹ <span id="petrolAmount">0</span>
</div>
</div><div class="card">
<h2>Diesel Sale</h2><div class="grid">
<div>
<label>Opening Totalizer</label>
<input id="dieselOpen" type="number">
</div><div>
<label>Closing Totalizer</label>
<input id="dieselClose" type="number">
</div>
</div><div class="result-box">
Sale Liter :
<span id="dieselLiter">0</span>
</div><div class="result-box">
Amount :
₹ <span id="dieselAmount">0</span>
</div>
</div><div class="card">
<h2>Final Result</h2><div class="result-box">
Total Sale :
₹ <span id="totalSale">0</span>
</div><div class="result-box" id="shortResult">
Perfect Match
</div><button class="reset" onclick="resetData()">
Reset Calculation
</button>
</div></div><script>
let petrolRate=parseFloat(localStorage.getItem("petrolRate"))||0;
let dieselRate=parseFloat(localStorage.getItem("dieselRate"))||0;

function updateRates(){
document.getElementById("petrolRateText").innerText=petrolRate;
document.getElementById("dieselRateText").innerText=dieselRate;
}

function editRate(type){
let current=type==="petrol"?petrolRate:dieselRate;
let value=prompt("Enter "+type+" rate",current);
if(value===null)return;
value=parseFloat(value);
if(isNaN(value))return;

if(type==="petrol"){
petrolRate=value;
localStorage.setItem("petrolRate",value);
}else{
dieselRate=value;
localStorage.setItem("dieselRate",value);
}
updateRates();
calculate();
}

const inputs=document.querySelectorAll("input");

inputs.forEach(i=>{
i.value=localStorage.getItem(i.id)||"";
i.addEventListener("input",()=>{
localStorage.setItem(i.id,i.value);
calculate();
});
});

function num(id){
return parseFloat(document.getElementById(id).value)||0;
}

function calculate(){

let collection=
num("deposit")+
num("card")+
num("balance")+
num("upi");

document.getElementById("collectionTotal").innerText=
collection.toFixed(2);

let petrolLiter=
num("petrolClose")-
num("petrolOpen");

if(petrolLiter<0)petrolLiter=0;

let petrolAmount=
petrolLiter*petrolRate;

document.getElementById("petrolLiter").innerText=
petrolLiter.toFixed(3);

document.getElementById("petrolAmount").innerText=
petrolAmount.toFixed(2);

let dieselLiter=
num("dieselClose")-
num("dieselOpen");

if(dieselLiter<0)dieselLiter=0;

let dieselAmount=
dieselLiter*dieselRate;

document.getElementById("dieselLiter").innerText=
dieselLiter.toFixed(3);

document.getElementById("dieselAmount").innerText=
dieselAmount.toFixed(2);

let totalSale=
petrolAmount+dieselAmount;

document.getElementById("totalSale").innerText=
totalSale.toFixed(2);

let diff=totalSale-collection;

let box=document.getElementById("shortResult");

if(diff>0){
box.className="result-box short";
box.innerHTML="🔴 Short : ₹ "+diff.toFixed(2);
}
else if(diff<0){
box.className="result-box excess";
box.innerHTML="🟢 Excess : ₹ "+Math.abs(diff).toFixed(2);
}
else{
box.className="result-box";
box.innerHTML="✅ Perfect Match";
}
}

function resetData(){
if(!confirm("Reset all calculations?")) return;

inputs.forEach(i=>{
i.value="";
localStorage.removeItem(i.id);
});

calculate();
}

updateRates();
calculate();

if(!localStorage.getItem("petrolRate")){
editRate("petrol");
}
if(!localStorage.getItem("dieselRate")){
editRate("diesel");
}
</script></body>
</html>
