<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.container{
    width:90%;
    max-width:600px;
    text-align:center;
}

h1{
    margin-bottom:30px;
    font-size:2.5rem;
}

.options{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    border:none;
    padding:20px 40px;
    font-size:1.3rem;
    font-weight:bold;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    color:white;
    min-width:200px;
}

.petrol{
    background:#e11d48;
}

.diesel{
    background:#16a34a;
}

.btn:hover{
    transform:scale(1.08);
}

.result{
    display:none;
    margin-top:30px;
    padding:25px;
    border-radius:20px;
    font-size:2rem;
    font-weight:bold;
    animation:flash 1s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

.petrol-box{
    background:#e11d48;
}

.diesel-box{
    background:#16a34a;
}

.reset{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    font-size:1rem;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

    <h1>⛽ Fuel Assistant</h1>

    <div class="options">
        <button class="btn petrol" onclick="selectFuel('PETROL')">
            ⛽ PETROL
        </button>

        <button class="btn diesel" onclick="selectFuel('DIESEL')">
            🚛 DIESEL
        </button>
    </div>

    <div id="result" class="result"></div>

    <button id="resetBtn" class="reset" style="display:none;"
        onclick="resetScreen()">
        Select Again
    </button>

</div>

<script>

function selectFuel(type){

    const result = document.getElementById("result");
    const resetBtn = document.getElementById("resetBtn");

    result.style.display = "block";
    resetBtn.style.display = "inline-block";

    if(type === "PETROL"){
        result.className = "result petrol-box";
        result.innerHTML =
        "⚠️ PLEASE LIFT THE PETROL NOZZLE ⚠️";
    }
    else{
        result.className = "result diesel-box";
        result.innerHTML =
        "⚠️ PLEASE LIFT THE DIESEL NOZZLE ⚠️";
    }

    // Voice Alert
    let msg = new SpeechSynthesisUtterance(
        "Please lift the " + type + " nozzle"
    );

    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

function resetScreen(){
    document.getElementById("result").style.display = "none";
    document.getElementById("resetBtn").style.display = "none";
}

</script>

</body>
</html>
