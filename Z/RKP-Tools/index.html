<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOOLBOX — All-in-One Tools</title>
    <link rel="manifest" href="/Z/RKP-Tools/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --card: #16161f;
  --card2: #1c1c28;
  --border: #2a2a3a;
  --accent: #c8f135;
  --accent2: #ff6b35;
  --accent3: #35c8f1;
  --text: #e8e8f0;
  --muted: #6b6b88;
  --glow: rgba(200,241,53,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* ─── HEADER ─── */
header {
  padding: 2rem 3rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-shadow: 0 0 40px var(--glow);
  line-height: 1;
}

.logo span { color: var(--text); }

.header-tag {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--muted);
  text-transform: uppercase;
  border: 1px solid var(--border);
  padding: 0.3rem 0.8rem;
  border-radius: 2px;
}

/* ─── GRID ─── */
.container { padding: 3rem; max-width: 1600px; margin: 0 auto; }

.section-label {
  font-size: 0.62rem;
  letter-spacing: 0.35em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.5px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 3rem;
}

/* ─── TOOL CARD ─── */
.tool-card {
  background: var(--card);
  padding: 1.8rem;
  cursor: pointer;
  transition: background 0.2s;
  position: relative;
  overflow: hidden;
}

.tool-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  transform: scaleX(0);
  transition: transform 0.4s;
}

.tool-card:hover::before { transform: scaleX(1); }
.tool-card:hover { background: var(--card2); }

.tool-number {
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  margin-bottom: 1rem;
}

.tool-icon {
  font-size: 2rem;
  margin-bottom: 0.8rem;
  display: block;
  filter: grayscale(0.3);
}

.tool-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.08em;
  color: var(--text);
  margin-bottom: 0.3rem;
}

.tool-desc {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  line-height: 1.6;
}

.tool-tag {
  display: inline-block;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  padding: 0.2rem 0.6rem;
  border-radius: 2px;
  margin-top: 1rem;
  background: rgba(200,241,53,0.08);
  color: var(--accent);
  border: 1px solid rgba(200,241,53,0.2);
}

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  padding: 1.5rem 1.8rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--card);
  z-index: 1;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.08em;
}

.modal-close {
  width: 32px; height: 32px;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--accent); color: #000; }

.modal-body { padding: 1.8rem; }

/* ─── INPUTS ─── */
.input-group { margin-bottom: 1.2rem; }

label {
  display: block;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

input, select, textarea {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.75rem 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
  border-radius: 0;
  -webkit-appearance: none;
  appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,241,53,0.08);
}

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }

.btn {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 0.8rem 1.5rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  margin-top: 0.5rem;
}
.btn:hover { background: #d9ff3d; box-shadow: 0 0 30px rgba(200,241,53,0.3); }

.btn-ghost {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.btn-ghost:hover { background: rgba(200,241,53,0.1); }

.result-box {
  margin-top: 1.5rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 1.2rem;
  font-size: 0.85rem;
  line-height: 1.8;
  min-height: 60px;
}

.result-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.05em;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 0.3rem;
}

.result-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ─── CALCULATOR BUTTONS ─── */
.calc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-top: 1rem;
}

.calc-btn {
  padding: 1rem;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.15s;
}
.calc-btn:hover { background: var(--card); border-color: var(--accent); color: var(--accent); }
.calc-btn.op { color: var(--accent2); }
.calc-btn.eq { background: var(--accent); color: #000; font-weight: 600; }
.calc-btn.eq:hover { background: #d9ff3d; }

.calc-display {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 1.2rem;
  text-align: right;
  font-size: 0.75rem;
  color: var(--muted);
  min-height: 80px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.calc-display .main { font-size: 2rem; color: var(--text); }

/* ─── SPINNING WHEEL ─── */
#wheel-canvas { display: block; margin: 0 auto; }

/* ─── COMPASS ─── */
.compass-ring {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: 2px solid var(--border);
  margin: 0 auto;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle, var(--card2) 0%, var(--bg) 100%);
}

.compass-needle {
  width: 4px;
  height: 80px;
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom center;
  transform: translateX(-50%) rotate(0deg);
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

.compass-needle-n {
  background: linear-gradient(to top, transparent 30%, #ff4444);
  border-radius: 4px 4px 0 0;
}

.compass-needle-s {
  width: 4px;
  height: 60px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: top center;
  transform: translateX(-50%) rotate(0deg);
  background: linear-gradient(to bottom, transparent 30%, var(--muted));
  border-radius: 0 0 4px 4px;
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

.compass-dir {
  position: absolute;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
}

/* ─── QR ─── */
#qr-output { background: white; padding: 1rem; display: inline-block; margin: 1rem auto; display: flex; justify-content: center; }
#qr-output canvas, #qr-output img { display: block; }

/* ─── LOREM ─── */
.lorem-output {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 1.2rem;
  font-family: 'Instrument Serif', serif;
  font-size: 0.9rem;
  line-height: 1.9;
  color: var(--text);
  max-height: 300px;
  overflow-y: auto;
  margin-top: 1rem;
  word-break: break-word;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ─── TAG COLORS ─── */
.tag-math { background: rgba(53,200,241,0.08); color: var(--accent3); border-color: rgba(53,200,241,0.2); }
.tag-time { background: rgba(255,107,53,0.08); color: var(--accent2); border-color: rgba(255,107,53,0.2); }
.tag-convert { background: rgba(200,241,53,0.08); color: var(--accent); border-color: rgba(200,241,53,0.2); }
.tag-gen { background: rgba(180,100,255,0.08); color: #c87aff; border-color: rgba(180,100,255,0.2); }
.tag-util { background: rgba(255,200,53,0.08); color: #ffc835; border-color: rgba(255,200,53,0.2); }

/* ─── RANGE SLIDER ─── */
input[type=range] {
  padding: 0;
  height: 4px;
  accent-color: var(--accent);
  cursor: pointer;
}

/* ─── WHEEL ITEMS ─── */
.wheel-items { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
.wheel-item-row { display: flex; gap: 0.5rem; }
.wheel-item-row input { flex: 1; }
.wheel-item-row button {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--accent2);
  padding: 0 0.8rem;
  cursor: pointer;
  font-size: 1rem;
}

/* ─── QR SCANNER ─── */
#qr-video { width: 100%; border: 1px solid var(--border); display: none; }
#qr-scan-result { margin-top: 1rem; }

/* ─── CURRENCY ─── */
.currency-display {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 1rem 0;
}
.currency-arrow { color: var(--accent); font-size: 1.5rem; }
</style>
</head>
<body>

<header>
  <div class="logo">TOOL<span>BOX</span></div>
  <div class="header-tag">— 17 Tools · All Frontend</div>
</header>

<div class="container">
  <div class="section-label">All Tools</div>
  <div class="tools-grid" id="tools-grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Tool</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// TOOL DEFINITIONS
// ═══════════════════════════════════════════════════════════

const tools = [
  { id:'live-speed', icon:'🏎️', title:'Live Speedometer', desc:'Real-time GPS speed tracker', tag:'Live', tagClass:'tag-util' },
  { id:'sci-calc', icon:'🔬', title:'Scientific Calculator', desc:'Advanced math functions', tag:'Math', tagClass:'tag-math' },
  { id:'time-diff', icon:'⏱️', title:'Time Difference', desc:'Duration between two times', tag:'Time', tagClass:'tag-time' },
  { id:'date-diff', icon:'📅', title:'Date Difference', desc:'Days between two dates', tag:'Time', tagClass:'tag-time' },
  { id:'percent-calc', icon:'📊', title:'% Increase / Decrease', desc:'Percentage change calculator', tag:'Math', tagClass:'tag-math' },
  { id:'age-calc', icon:'🎂', title:'Age Calculator', desc:'Your exact age from birthday', tag:'Time', tagClass:'tag-time' },
  { id:'data-size', icon:'💾', title:'Data Size Converter', desc:'Bytes ↔ KB ↔ MB ↔ GB ↔ TB', tag:'Convert', tagClass:'tag-convert' },
  { id:'spin-wheel', icon:'🎡', title:'Spinning Wheel', desc:'Random choice from your options', tag:'Chance', tagClass:'tag-util' },
  { id:'speed-conv', icon:'🚀', title:'Speed Converter', desc:'m/s · km/h · mph · knots', tag:'Convert', tagClass:'tag-convert' },
  { id:'lorem', icon:'📝', title:'Lorem Ipsum Generator', desc:'Generate placeholder text', tag:'Generate', tagClass:'tag-gen' },
  { id:'age-diff', icon:'👥', title:'Age Difference', desc:'Difference between two birthdays', tag:'Time', tagClass:'tag-time' },
  { id:'rng', icon:'🎲', title:'Random Number Generator', desc:'Random number in any range', tag:'Chance', tagClass:'tag-util' },
];

// Render grid
const grid = document.getElementById('tools-grid');
tools.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'tool-card';
  card.innerHTML = `
    <div class="tool-number">// ${String(i+1).padStart(2,'0')}</div>
    <span class="tool-icon">${t.icon}</span>
    <div class="tool-title">${t.title}</div>
    <div class="tool-desc">${t.desc}</div>
    <span class="tool-tag ${t.tagClass}">${t.tag}</span>
  `;
  card.onclick = () => openTool(t.id, t.title);
  grid.appendChild(card);
});

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════

function openTool(id, title) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = renderTool(id);
  document.getElementById('modal-overlay').classList.add('active');
  initTool(id);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  // Stop camera if running
  if (window._qrStream) { window._qrStream.getTracks().forEach(t=>t.stop()); window._qrStream=null; }
  if (window._compassWatch) { navigator.geolocation && window._compassWatch; }
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ═══════════════════════════════════════════════════════════
// TOOL RENDERERS
// ═══════════════════════════════════════════════════════════

function renderTool(id) {
  switch(id) {

          // ── LIVE SPEEDOMETER ──
case 'live-speed': return `
  <div style="text-align:center">

    <div style="
      width:260px;
      height:260px;
      border-radius:50%;
      margin:0 auto;
      border:8px solid var(--border);
      background:radial-gradient(circle,var(--card2),var(--bg));
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 40px rgba(200,241,53,0.08);
      position:relative;
    ">

      <div id="live-speed-value"
        style="
          font-family:'Bebas Neue',sans-serif;
          font-size:4rem;
          color:var(--accent);
          line-height:1;
        ">
        0
      </div>

      <div style="
        font-size:0.8rem;
        letter-spacing:0.2em;
        color:var(--muted);
      ">
        KM/H
      </div>

    </div>

    <div id="live-speed-status"
      style="
        margin-top:1rem;
        font-size:0.7rem;
        color:var(--muted);
        letter-spacing:0.1em;
      ">
      Waiting for GPS...
    </div>

    <button class="btn" onclick="startSpeedometer()">
      START SPEEDOMETER
    </button>

    <button class="btn btn-ghost" onclick="stopSpeedometer()">
      STOP
    </button>

  </div>
`;
          
    // ── SCIENTIFIC CALCULATOR ──
    case 'sci-calc': return `
      <div class="calc-display">
        <div id="sci-expr" style="font-size:0.75rem;color:var(--muted);min-height:1.2em"></div>
        <div class="main" id="sci-disp">0</div>
      </div>
      <div class="calc-grid" style="grid-template-columns:repeat(5,1fr)">
        ${['sin','cos','tan','log','√','π','e','(',')','^','7','8','9','÷','C','4','5','6','×','⌫','1','2','3','−','+','±','0','.','=','%']
          .map(b=>`<button class="calc-btn ${['÷','×','−','+','^'].includes(b)?'op':b==='='?'eq':['sin','cos','tan','log','√','π','e'].includes(b)?'op':''}" style="font-size:0.72rem;padding:0.75rem" onclick="sciBtn('${b}')">${b}</button>`).join('')}
      </div>`;

    // ── TIME DIFFERENCE ──
    case 'time-diff': return `
      <div class="two-col">
        <div class="input-group">
          <label>Start Time</label>
          <input type="time" id="t1" value="09:00">
        </div>
        <div class="input-group">
          <label>End Time</label>
          <input type="time" id="t2" value="17:30">
        </div>
      </div>
      <button class="btn" onclick="calcTimeDiff()">CALCULATE</button>
      <div class="result-box" id="time-result"></div>`;

    // ── DATE DIFFERENCE ──
    case 'date-diff': return `
      <div class="two-col">
        <div class="input-group">
          <label>Start Date</label>
          <input type="date" id="d1">
        </div>
        <div class="input-group">
          <label>End Date</label>
          <input type="date" id="d2">
        </div>
      </div>
      <button class="btn" onclick="calcDateDiff()">CALCULATE</button>
      <div class="result-box" id="date-result"></div>`;

    // ── PERCENT ──
    case 'percent-calc': return `
      <div class="two-col">
        <div class="input-group">
          <label>Original Value</label>
          <input type="number" id="pv1" placeholder="100">
        </div>
        <div class="input-group">
          <label>New Value</label>
          <input type="number" id="pv2" placeholder="125">
        </div>
      </div>
      <button class="btn" onclick="calcPercent()">CALCULATE</button>
      <div class="result-box" id="pct-result"></div>`;

    // ── AGE CALCULATOR ──
    case 'age-calc': return `
      <div class="input-group">
        <label>Your Date of Birth</label>
        <input type="date" id="dob">
      </div>
      <div class="input-group">
        <label>Calculate Age On</label>
        <input type="date" id="ageon">
      </div>
      <button class="btn" onclick="calcAge()">CALCULATE AGE</button>
      <div class="result-box" id="age-result"></div>`;

    
    // ── DATA SIZE ──
    case 'data-size': return `
      <div class="input-group">
        <label>Value</label>
        <input type="number" id="ds-val" placeholder="Enter size" oninput="convertData()">
      </div>
      <div class="input-group">
        <label>Unit</label>
        <select id="ds-unit" onchange="convertData()">
          <option value="B">Bytes (B)</option>
          <option value="KB">Kilobytes (KB)</option>
          <option value="MB" selected>Megabytes (MB)</option>
          <option value="GB">Gigabytes (GB)</option>
          <option value="TB">Terabytes (TB)</option>
        </select>
      </div>
      <div class="result-box" id="ds-result" style="font-size:0.8rem;line-height:2"></div>`;

    
    // ── SPINNING WHEEL ──
    case 'spin-wheel': return `
      <div class="wheel-items" id="wheel-items">
        <div class="wheel-item-row"><input placeholder="Option 1" value="Option 1"><button onclick="removeWheelItem(this)">✕</button></div>

// ═══════════════════════════════════════════════════════════
// SCIENTIFIC CALCULATOR
// ═══════════════════════════════════════════════════════════

const sciState = {
  expr: '', display: '0',
  reset() { this.expr=''; this.display='0'; this.update(); },
  update() {
    const d = document.getElementById('sci-disp');
    const e = document.getElementById('sci-expr');
    if(d) d.textContent = this.display;
    if(e) e.textContent = this.expr;
  }
};

function sciBtn(b) {
  const s = sciState;
  if (b === 'C') { s.reset(); return; }
  if (b === '⌫') {
    s.expr = s.expr.slice(0,-1);
    s.display = s.expr || '0';
    s.update(); return;
  }
  if (b === '=') {
    try {
      let e = s.expr
        .replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-')
        .replace(/π/g,'Math.PI').replace(/e(?![x])/g,'Math.E')
        .replace(/sin\(/g,'Math.sin(').replace(/cos\(/g,'Math.cos(')
        .replace(/tan\(/g,'Math.tan(').replace(/log\(/g,'Math.log10(')
        .replace(/√\(/g,'Math.sqrt(').replace(/\^/g,'**');
      const res = Function('"use strict";return ('+e+')')();
      s.display = String(+res.toFixed(10));
      s.expr = s.display;
    } catch(err) { s.display = 'Error'; }
    s.update(); return;
  }
  const fns = {'sin':'sin(','cos':'cos(','tan':'tan(','log':'log(','√':'√('};
  if (fns[b]) { s.expr += fns[b]; }
  else if (b === 'π') { s.expr += 'π'; }
  else if (b === 'e') { s.expr += 'e'; }
  else if (b === '±') { s.expr = s.expr ? '-('+s.expr+')' : ''; }
  else if (b === '%') { s.expr += '/100'; }
  else { s.expr += b; }
  s.display = s.expr;
  s.update();
}

// ═══════════════════════════════════════════════════════════
// TIME DIFFERENCE
// ═══════════════════════════════════════════════════════════

function calcTimeDiff() {
  const t1 = document.getElementById('t1').value;
  const t2 = document.getElementById('t2').value;
  if(!t1||!t2) return;
  const [h1,m1] = t1.split(':').map(Number);
  const [h2,m2] = t2.split(':').map(Number);
  let mins = (h2*60+m2) - (h1*60+m1);
  if(mins < 0) mins += 1440;
  const h = Math.floor(mins/60), m = mins%60;
  document.getElementById('time-result').innerHTML = `
    <div class="result-big">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}</div>
    <div class="result-label">Hours : Minutes</div>
    <div style="margin-top:0.8rem;font-size:0.75rem;color:var(--muted)">${mins} total minutes &nbsp;·&nbsp; ${(mins/60).toFixed(2)} hours</div>
  `;
}

// ═══════════════════════════════════════════════════════════
// DATE DIFFERENCE
// ═══════════════════════════════════════════════════════════

function calcDateDiff() {
  const d1 = new Date(document.getElementById('d1').value);
  const d2 = new Date(document.getElementById('d2').value);
  if(isNaN(d1)||isNaN(d2)) return;
  const ms = Math.abs(d2-d1);
  const days = Math.floor(ms/86400000);
  const weeks = Math.floor(days/7);
  const months = Math.floor(days/30.4375);
  const years = Math.floor(days/365.25);
  document.getElementById('date-result').innerHTML = `
    <div class="result-big">${days}</div>
    <div class="result-label">Days</div>
    <div style="margin-top:0.8rem;font-size:0.75rem;color:var(--muted)">
      ${weeks} weeks &nbsp;·&nbsp; ${months} months &nbsp;·&nbsp; ${years} years
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// PERCENT CALC
// ═══════════════════════════════════════════════════════════

function calcPercent() {
  const v1 = parseFloat(document.getElementById('pv1').value);
  const v2 = parseFloat(document.getElementById('pv2').value);
  if(isNaN(v1)||isNaN(v2)||v1===0) return;
  const change = ((v2-v1)/Math.abs(v1))*100;
  const isIncrease = change >= 0;
  const color = isIncrease ? 'var(--accent)' : 'var(--accent2)';
  document.getElementById('pct-result').innerHTML = `
    <div class="result-big" style="color:${color}">${isIncrease?'+':''}${change.toFixed(2)}%</div>
    <div class="result-label">${isIncrease ? '📈 Increase' : '📉 Decrease'}</div>
    <div style="margin-top:0.8rem;font-size:0.75rem;color:var(--muted)">
      From ${v1} → ${v2} &nbsp;·&nbsp; Change: ${(v2-v1).toFixed(4)}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// AGE CALCULATOR
// ═══════════════════════════════════════════════════════════

function calcAge() {
  const dob = new Date(document.getElementById('dob').value);
  const on = new Date(document.getElementById('ageon').value);
  if(isNaN(dob)||isNaN(on)) return;
  let y = on.getFullYear() - dob.getFullYear();
  let m = on.getMonth() - dob.getMonth();
  let d = on.getDate() - dob.getDate();
  if(d<0) { m--; d += new Date(on.getFullYear(), on.getMonth(), 0).getDate(); }
  if(m<0) { y--; m+=12; }
  const totalDays = Math.floor((on-dob)/86400000);
  document.getElementById('age-result').innerHTML = `
    <div class="result-big">${y}</div>
    <div class="result-label">Years old</div>
    <div style="margin-top:0.8rem;font-size:0.75rem;color:var(--muted)">
      ${y} years &nbsp;·&nbsp; ${m} months &nbsp;·&nbsp; ${d} days<br>
      Total: ${totalDays.toLocaleString()} days &nbsp;·&nbsp; ${(totalDays*24).toLocaleString()} hours
    </div>
  `;
}

// DATA SIZE CONVERTER
// ═══════════════════════════════════════════════════════════

function convertData() {
  const val = parseFloat(document.getElementById('ds-val').value)||0;
  const unit = document.getElementById('ds-unit').value;
  const inBytes = { B:1, KB:1024, MB:1024**2, GB:1024**3, TB:1024**4 };
  const bytes = val * inBytes[unit];
  const res = document.getElementById('ds-result');
  if(!res) return;
  res.innerHTML = Object.entries(inBytes).map(([u,b])=>{
    const v = bytes/b;
    const active = u===unit;
    return `<div style="display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid var(--border);${active?'color:var(--accent)':''}">
      <span>${u}</span><span style="font-weight:500">${formatNum(v)}</span>
    </div>`;
  }).join('');
}

function formatNum(n) {
  if(n >= 1e12 || (n < 0.0001 && n > 0)) return n.toExponential(4);
  return n.toLocaleString(undefined,{maximumFractionDigits:6});
}

// SPINNING WHEEL
// ═══════════════════════════════════════════════════════════

let wheelAngle = 0;
let isSpinning = false;
const wheelColors = ['#c8f135','#ff6b35','#35c8f1','#c87aff','#ffc835','#ff4488','#35f1c8','#f1c835'];

function addWheelItem() {
  const container = document.getElementById('wheel-items');
  const row = document.createElement('div');
  row.className = 'wheel-item-row';
  row.innerHTML = `<input placeholder="Option"><button onclick="removeWheelItem(this)">✕</button>`;
  container.appendChild(row);
  drawWheel();
}

function removeWheelItem(btn) {
  btn.parentElement.remove();
  drawWheel();
}

function getWheelOptions() {
  return [...document.querySelectorAll('.wheel-item-row input')].map(i=>i.value||'?');
}

function drawWheel(angle=0) {
  const canvas = document.getElementById('wheel-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const opts = getWheelOptions();
  const n = opts.length;
  if(n===0) return;
  const cx=150, cy=150, r=130;
  ctx.clearRect(0,0,300,300);
  const arc = (Math.PI*2)/n;
  opts.forEach((opt,i) => {
    const start = angle + i*arc - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+arc);
    ctx.fillStyle = wheelColors[i%wheelColors.length];
    ctx.fill();
    ctx.strokeStyle = '#0a0a0f';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#000';
    ctx.font = 'bold 13px DM Mono, monospace';
    const label = opt.length > 12 ? opt.slice(0,12)+'…' : opt;
    ctx.fillText(label, r-10, 5);
    ctx.restore();
  });
  // Center circle
  ctx.beginPath();
  ctx.arc(cx,cy,18,0,Math.PI*2);
  ctx.fillStyle = '#0a0a0f';
  ctx.fill();
  ctx.strokeStyle = 'var(--border)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Pointer
  ctx.beginPath();
  ctx.moveTo(cx+r+14, cy);
  ctx.lineTo(cx+r+2, cy-8);
  ctx.lineTo(cx+r+2, cy+8);
  ctx.fillStyle = '#c8f135';
  ctx.fill();
}

function spinWheel() {
  if(isSpinning) return;
  const opts = getWheelOptions();
  if(opts.length < 2) return;
  isSpinning = true;
  const totalRotation = (Math.PI*2) * (5 + Math.random()*5);
  const duration = 3000 + Math.random()*1500;
  const start = performance.now();
  const startAngle = wheelAngle;
  function animate(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed/duration, 1);
    const ease = 1 - Math.pow(1-progress, 4);
    wheelAngle = startAngle + totalRotation * ease;
    drawWheel(wheelAngle);
    if(progress < 1) { requestAnimationFrame(animate); }
    else {
      isSpinning = false;
      const arc = (Math.PI*2)/opts.length;
      const normalizedAngle = ((wheelAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
      // Pointer is at angle=0 (right side), wheel starts at -π/2
      const idx = Math.floor(((Math.PI*2 - (normalizedAngle % (Math.PI*2))) / arc)) % opts.length;
      document.getElementById('spin-result').innerHTML = `
        <div style="font-size:0.65rem;letter-spacing:0.2em;color:var(--muted);margin-bottom:0.5rem">RESULT</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent)">${opts[idx]}</div>
      `;
    }
  }
  requestAnimationFrame(animate);
}

function convertSpeed() {
  const val = parseFloat(document.getElementById('spd-val').value)||0;
  const unit = document.getElementById('spd-unit').value;
  const toMS = { ms:1, kmh:1/3.6, mph:0.44704, kn:0.514444 };

  const res = document.getElementById('spd-result');
  if(!res) return;
  const units = [
    ['m/s', ms],
    ['km/h', ms*3.6],
    ['mph', ms/0.44704],
    ['knots', ms/0.514444],
    ['ft/s', ms*3.28084],
  ];
  const activeLabel = {ms:'m/s',kmh:'km/h',mph:'mph',kn:'knots'}[unit];
  res.innerHTML = units.map(([u,v])=>`
    <div style="display:flex;justify-content:space-between;padding:0.25rem 0;border-bottom:1px solid var(--border);${u===activeLabel?'color:var(--accent)':''}">

}

function generateLorem() {

// AGE DIFFERENCE
// ═══════════════════════════════════════════════════════════

function calcAgeDiff() {
  const d1 = new Date(document.getElementById('agediff-1').value);
  const d2 = new Date(document.getElementById('agediff-2').value);
  if(isNaN(d1)||isNaN(d2)) return;
  const older = d1 < d2 ? d1 : d2;
  const younger = d1 < d2 ? d2 : d1;
  const ms = younger - older;
  const days = Math.floor(ms/86400000);
  const y = Math.floor(days/365.25);
  const m = Math.floor((days%365.25)/30.44);
  const d = Math.floor((days%365.25)%30.44);
  const today = new Date();
  function getAge(bd) {
    let yr = today.getFullYear()-bd.getFullYear();
    if(today.getMonth()<bd.getMonth()||(today.getMonth()===bd.getMonth()&&today.getDate()<bd.getDate())) yr--;
    return yr;
  }
  const age1 = getAge(d1), age2 = getAge(d2);
  document.getElementById('agediff-result').innerHTML = `
    <div class="result-big">${y}</div>
    <div class="result-label">Years difference</div>
    <div style="margin-top:0.8rem;font-size:0.75rem;color:var(--muted)">
      ${y} years · ${m} months · ${d} days<br>
      Person 1 is ${age1} years old · Person 2 is ${age2} years old
    </div>
  `;
}

}

// ═══════════════════════════════════════════════════════════
// LIVE SPEEDOMETER
// ═══════════════════════════════════════════════════════════


  let speedWatchId = null;

let lastPosition = null;
let lastTimestamp = null;

function startSpeedometer() {

  const speedEl = document.getElementById('live-speed-value');
  const statusEl = document.getElementById('live-speed-status');

  if (!navigator.geolocation) {
    statusEl.textContent = 'Geolocation not supported';
    return;
  }

  statusEl.textContent = 'Connecting GPS...';

  speedWatchId = navigator.geolocation.watchPosition(

    pos => {

      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const now = pos.timestamp;

      // First reading
      if (!lastPosition) {

        lastPosition = { lat, lon };
        lastTimestamp = now;

        statusEl.textContent = 'Move to detect speed...';
        speedEl.textContent = '0';

        return;
      }

      // Distance in meters
      const distance = getDistance(
        lastPosition.lat,
        lastPosition.lon,
        lat,
        lon
      );

      // Time difference in seconds
      const timeDiff = (now - lastTimestamp) / 1000;

      // Speed m/s
      const speedMS = distance / timeDiff;

      // Convert km/h
      const speedKMH = speedMS * 3.6;

      // Ignore fake GPS jumps
      const finalSpeed = speedKMH > 300 ? 0 : speedKMH;

      speedEl.textContent = Math.round(finalSpeed);

      statusEl.innerHTML = `
        Accuracy: ${Math.round(pos.coords.accuracy)}m
      `;

      // Update previous position
      lastPosition = { lat, lon };
      lastTimestamp = now;

    },

    err => {

      switch(err.code) {

        case err.PERMISSION_DENIED:
          statusEl.textContent = 'Location permission denied';
          break;

        case err.POSITION_UNAVAILABLE:
          statusEl.textContent = 'Location unavailable';
          break;

        case err.TIMEOUT:
          statusEl.textContent = 'GPS timeout';
          break;

        default:
          statusEl.textContent = 'GPS error';
      }

    },

    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }

  );

}


function getDistance(lat1, lon1, lat2, lon2) {

  const R = 6371000;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) *
    Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

  return R * c;
}


function stopSpeedometer() {

  if (speedWatchId !== null) {

    navigator.geolocation.clearWatch(speedWatchId);

    speedWatchId = null;
  }

  lastPosition = null;
  lastTimestamp = null;

  document.getElementById('live-speed-status').textContent = 'Stopped';
}
