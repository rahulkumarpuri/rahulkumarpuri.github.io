<!DOCTYPE html>
<html>
<head>
<title>RKP Audio Cover Bot 🔥</title>
<style>
body { font-family: sans-serif; padding:15px; }
#log { background:#111; color:#0f0; height:200px; overflow:auto; padding:10px; }
input { width:95%; padding:8px; }
</style>
</head>

<body>

<h2>🎵 RKP Bot (Final Version 😏)</h2>

<input type="file" id="files" multiple accept=".mp3">

<h3>🔗 Paste Image URL</h3>
<input type="text" id="imgInput" placeholder="Paste here...">

<h3>📊 Logs</h3>
<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>

let files = [];
let index = 0;
let images = [];
let zip = new JSZip();

// 🧠 LOG
function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>";
}

// 🧠 CACHE SAVE
function saveCache(){
  let data = {
    files: files.map(f => f.name),
    index: index,
    images: images,
    time: Date.now()
  };
  localStorage.setItem("rkp_cache", JSON.stringify(data));
}

// 🧠 CACHE LOAD
function loadCache(){
  let data = JSON.parse(localStorage.getItem("rkp_cache"));
  if(!data) return;

  if(Date.now() - data.time > 7*24*60*60*1000){
    localStorage.removeItem("rkp_cache");
    return;
  }

  index = data.index || 0;
  images = data.images || [];

  log("♻️ Cache restored");
}

loadCache();

// 🧠 FILE INPUT
document.getElementById("files").onchange = function(e){
  files = Array.from(e.target.files);
  index = 0;
  images = [];
  nextFile();
};

// 🧠 CLEAN NAME
function cleanName(n){
  return n.replace(/\.[^/.]+$/, "");
}

// 🧠 NEXT FILE
function nextFile(){

  if(index >= files.length){
    log("📦 Creating ZIP...");

    images.forEach(img => {
      zip.file(img.name, img.blob);
    });

    zip.generateAsync({type:"blob"}).then(content=>{
      let a = document.createElement("a");
      a.href = URL.createObjectURL(content);
      a.download = "covers.zip";
      a.click();
      log("🎉 DONE!");
    });

    return;
  }

  let name = cleanName(files[index].name);

  let search = encodeURIComponent(name + " official cover");

  log("🔍 " + name);

  setTimeout(()=>{
    window.location.href = "https://www.google.com/search?tbm=isch&q=" + search;
  },500);
}

// 🧠 AUTO SUBMIT (paste detect)
document.getElementById("imgInput").addEventListener("input", ()=>{
  if(document.getElementById("imgInput").value.length > 10){
    processImage();
  }
});

// 🧠 PROCESS IMAGE
async function processImage(){

  let url = document.getElementById("imgInput").value;
  let name = cleanName(files[index].name);

  try{

    let finalURL = url;

    // GOOGLE LINK FIX
    if(url.includes("imgres")){
      let u = new URL(url);
      finalURL = decodeURIComponent(u.searchParams.get("imgurl"));
    }

    // BASE64
    if(finalURL.startsWith("data:image")){

      let arr = finalURL.split(',');
      let mime = arr[0].match(/:(.*?);/)[1];
      let bstr = atob(arr[1]);
      let n = bstr.length;
      let u8arr = new Uint8Array(n);

      while(n--){
        u8arr[n] = bstr.charCodeAt(n);
      }

      let blob = new Blob([u8arr], {type:mime});

      images.push({name: name + ".jpg", blob});
      log("✅ Saved (base64)");

    }else{

      let res = await fetch(finalURL);
      let blob = await res.blob();

      if(blob.size < 1000) throw "Invalid";

      let ext = blob.type.split("/")[1] || "jpg";

      images.push({name: name + "." + ext, blob});
      log("✅ Saved");

    }

  }catch(e){
    log("❌ Failed → retry");
    return;
  }

  document.getElementById("imgInput").value = "";

  index++;
  saveCache();

  setTimeout(()=>{
    nextFile();
  },800);
}

</script>

</body>
</html>
