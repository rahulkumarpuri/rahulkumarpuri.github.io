<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RKP Audio Cover Bot 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  padding:10px;
}

.container{
  width:100%;
  max-width:500px;
  min-height:95vh;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;
  flex-direction:column;
}

h2{
  text-align:center;
  margin-bottom:10px;
  font-weight:700;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

#counter{
  text-align:center;
  font-size:13px;
  margin-bottom:10px;
  opacity:0.8;
  background: rgba(255,255,255,0.05);
  padding:6px;
  border-radius:8px;
}

#resumeBtn{
  display:none;
  margin-bottom:10px;
}

label{
  font-size:13px;
  opacity:0.8;
}

input,button{
  width:100%;
  margin-top:8px;
  margin-bottom:15px;
  padding:12px;
  border:none;
  outline:none;
  border-radius:12px;
}

input{
  background:rgba(255,255,255,0.1);
  color:white;
}

button{
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  color:white;
  font-weight:600;
  cursor:pointer;
}

#log{
  flex-grow:1;
  overflow:auto;
  padding:10px;
  background:#000;
  border-radius:12px;
  font-size:12px;
  box-shadow: inset 0 0 10px #00ff00;
  color:#0f0;
}

</style>
</head>

<body>

<div class="container">

<h2>🎵 RKP Cover Bot</h2>

<div id="counter">No files loaded 😴</div>

<button id="resumeBtn">🔁 Resume Previous Session</button>

<label>Select Audio Files</label>
<input type="file" id="files" multiple accept=".mp3">

<label>Paste Image URL</label>
<input type="text" id="imgInput">

<button onclick="processImage()">🚀 Submit</button>

<div id="log"></div>

</div>

<script>

let files = [];
let index = 0;
let savedTotal = 0;

/* 🔥 SAVE STATE */
function saveState(){
  localStorage.setItem("rkp_index", index);
  localStorage.setItem("rkp_total", files.length);
}

/* 🔥 LOAD STATE */
function loadState(){
  let i = localStorage.getItem("rkp_index");
  let t = localStorage.getItem("rkp_total");

  if(i !== null && t !== null){
    index = parseInt(i);
    savedTotal = parseInt(t);

    document.getElementById("counter").innerText =
      `${savedTotal} Files loaded | ${index} completed | ${savedTotal - index} remaining`;

    document.getElementById("resumeBtn").style.display = "block";
  }
}

/* 🔥 COUNTER */
function updateCounter(){
  let total = files.length;
  let remaining = total - index;

  document.getElementById("counter").innerText =
    `${total} Files loaded | ${index} completed | ${remaining} remaining`;
}

/* 🔥 LOG */
const log = (msg) => {
  let box = document.getElementById("log");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
};

/* 🔥 FILE SELECT */
document.getElementById("files").onchange = function(e){
  files = Array.from(e.target.files);

  if(index > files.length) index = 0;

  updateCounter();
  saveState();
};

/* 🔥 RESUME */
document.getElementById("resumeBtn").onclick = function(){
  if(files.length === 0){
    alert("Pehle files select kar bhai 😏");
    return;
  }

  log("🔁 Resuming from: " + index);
  this.style.display = "none";
  nextFile();
};

/* 🔥 CLEAN NAME */
function cleanName(name){
  return name.replace(/\.[^/.]+$/, "");
}

/* 🔥 NEXT FILE */
function nextFile(){

  if(index >= files.length){
    log("🎉 DONE ALL FILES");
    localStorage.clear();
    return;
  }

  let file = files[index];
  let name = cleanName(file.name);

  let search = encodeURIComponent(name + " official cover photo");

  log("🔍 Searching: " + name);

  setTimeout(()=>{
    window.open("https://www.google.com/search?tbm=isch&q=" + search, "_blank");
  },600);
}

/* 🔥 PROCESS IMAGE */
async function processImage(){

  let url = document.getElementById("imgInput").value;

  if(!url){
    alert("URL daal bhai 😭");
    return;
  }

  let name = cleanName(files[index].name);

  try{

    let finalURL = url;

    if(url.includes("imgres")){
      let u = new URL(url);
      finalURL = decodeURIComponent(u.searchParams.get("imgurl"));
    }

    let res = await fetch(finalURL);
    let blob = await res.blob();

    downloadBlob(blob, name);

  }catch(e){
    log("❌ Failed");
  }
}

/* 🔥 DOWNLOAD */
function downloadBlob(blob, name){

  let ext = blob.type.split("/")[1] || "jpg";

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + "." + ext;
  a.click();

  log("✅ Downloaded: " + name);

  index++;
  updateCounter();
  saveState();

  document.getElementById("imgInput").value = "";

  setTimeout(nextFile, 800);
}

/* 🔥 LOAD ON START */
window.onload = loadState;

</script>

</body>
</html>
