<!DOCTYPE html>
<html>
<head>
  <title>MP3 Cover Tool PRO MAX</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #progressBar { width: 100%; height: 25px; background: #ddd; }
    #progress { height: 100%; width: 0%; background: green; }
    #log { margin-top:10px; height:200px; overflow:auto; background:#111; color:#0f0; padding:10px; }
  </style>
</head>
<body>

<h2>MP3 Cover Tool (FIXED VERSION 😏)</h2>

<input type="file" id="fileInput" multiple accept=".mp3">
<button onclick="processFiles()">Start</button>

<div id="progressBar"><div id="progress"></div></div>
<p id="status">Waiting...</p>
<div id="log"></div>

<script src="https://unpkg.com/browser-id3-writer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>

function log(msg){
  let box=document.getElementById("log");
  box.innerHTML+=msg+"<br>";
  box.scrollTop=box.scrollHeight;
}

// 🔥 REAL DDG IMAGE SEARCH
async function getImage(query){
  try{
    // Step 1: get token
    let res1=await fetch("https://duckduckgo.com/?q="+encodeURIComponent(query));
    let text=await res1.text();

    let vqd=text.match(/vqd='(.*?)'/);
    if(!vqd) return null;

    // Step 2: image API
    let res2=await fetch(
      `https://duckduckgo.com/i.js?l=us-en&o=json&q=${encodeURIComponent(query)}&vqd=${vqd[1]}`
    );

    let json=await res2.json();

    if(!json.results.length) return null;

    return json.results[0].image;

  }catch(e){
    return null;
  }
}

async function processFiles(){

  let files=document.getElementById("fileInput").files;
  let total=files.length;

  if(!total){
    alert("Files daal pehle bhai 😭");
    return;
  }

  let zip=new JSZip();
  let success=0, fail=0, done=0;

  for(let file of files){

    let name=file.name.replace(".mp3","");
    let clean=name.replace(/[_-]+/g," ");
    let query=clean+" official cover";

    log("🔍 "+query);

    try{

      let imgUrl=await getImage(query);

      if(!imgUrl){
        log("❌ no image: "+file.name);
        fail++;
        continue;
      }

      let img=await fetch(imgUrl);
      let imgBuf=await img.arrayBuffer();

      let audio=await file.arrayBuffer();

      let writer=new ID3Writer(audio);
      writer.setFrame("TIT2",clean)
            .setFrame("APIC",{
              type:3,
              data:imgBuf,
              description:"cover"
            });

      writer.addTag();

      let blob=writer.getBlob();
      zip.file(file.name,blob);

      success++;
      log("✅ done: "+file.name);

    }catch(e){
      fail++;
      log("💥 error: "+file.name);
    }

    done++;

    let percent=Math.round((done/total)*100);
    document.getElementById("progress").style.width=percent+"%";
    document.getElementById("status").innerText=
      `Done ${done}/${total} | Success ${success} | Fail ${fail}`;
  }

  // ZIP FIX
  if(success===0){
    log("🚫 koi file process nahi hui. ZIP cancel.");
    return;
  }

  log("📦 creating zip...");

  let content=await zip.generateAsync({type:"blob"});

  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="songs_with_cover.zip";
  a.click();

  log("🎉 DONE BHAI 🔥");
}

</script>

</body>
</html>
