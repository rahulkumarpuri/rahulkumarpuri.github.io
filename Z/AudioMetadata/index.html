<!DOCTYPE html>
<html>
<head>
<title>RKP Audio Cover Bot 😏🔥</title>
<style>
body { font-family: sans-serif; padding: 15px; }
#log { background:#111; color:#0f0; padding:10px; height:200px; overflow:auto; }
input { width: 90%; padding:8px; }
button { padding:8px 12px; margin-top:5px; }
</style>
</head>

<body>

<h2>🎵 RKP Audio Cover Bot</h2>

<input type="file" id="files" multiple accept=".mp3">

<h3>🔗 Paste Image URL</h3>
<input type="text" id="imgInput">
<button onclick="processImage()">Submit</button>

<h3>📊 Logs</h3>
<div id="log"></div>

<script>

let files = [];
let index = 0;

const log = (msg) => {
  document.getElementById("log").innerHTML += msg + "<br>";
};

document.getElementById("files").onchange = function(e){
  files = Array.from(e.target.files);
  index = 0;
  nextFile();
};

function cleanName(name){
  return name.replace(/\.[^/.]+$/, "");
}

function nextFile(){

  if(index >= files.length){
    log("🎉 DONE ALL FILES");
    return;
  }

  let file = files[index];
  let name = cleanName(file.name);

  let search = encodeURIComponent(name + " official cover photo");

  log("🔍 Searching: " + name);

  // delay then open google
  setTimeout(()=>{
    window.open("https://www.google.com/search?tbm=isch&q=" + search, "_blank");
  },500);
}

async function processImage(){

  let url = document.getElementById("imgInput").value;

  if(!url){
    alert("URL daal bhai 😭");
    return;
  }

  let file = files[index];
  let name = cleanName(file.name);

  try{

    let finalURL = url;

    // 🔥 CASE 1: Google imgres
    if(url.includes("imgres")){
      let u = new URL(url);
      finalURL = decodeURIComponent(u.searchParams.get("imgurl"));
      log("✅ Extracted imgurl");
    }

    // 🔥 CASE 2: Base64
    if(finalURL.startsWith("data:image")){
      log("⚡ Base64 detected");

      let arr = finalURL.split(',');
      let mime = arr[0].match(/:(.*?);/)[1];
      let bstr = atob(arr[1]);
      let n = bstr.length;
      let u8arr = new Uint8Array(n);

      while(n--){
        u8arr[n] = bstr.charCodeAt(n);
      }

      let blob = new Blob([u8arr], {type:mime});

      downloadBlob(blob, name);
      return;

    }

    // 🔥 CASE 3: Normal image
    let res = await fetch(finalURL);
    let blob = await res.blob();

    if(blob.size < 1000){
      throw "Invalid image";
    }

    downloadBlob(blob, name);

  }catch(e){
    log("❌ Failed: " + name);
    alert("Retry karo bhai 😭");
  }

}

function downloadBlob(blob, name){

  let ext = blob.type.split("/")[1] || "jpg";

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + "." + ext;
  a.click();

  log("✅ Downloaded: " + name);

  index++;
  document.getElementById("imgInput").value = "";

  setTimeout(()=>{
    nextFile();
  },1000);

}

</script>

</body>
</html>
