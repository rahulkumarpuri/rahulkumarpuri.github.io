<!DOCTYPE html>
<html>
<head>
<title>RKP Cover Bot PRO 😏🔥</title>
<style>
body { font-family: sans-serif; padding:15px; }
#log { background:#111; color:#0f0; height:200px; overflow:auto; padding:10px; }
input { width:90%; padding:8px; }
</style>
</head>

<body>

<h2>🔥 RKP Audio Cover Bot PRO</h2>

<input type="file" id="files" multiple accept=".mp3">
<br><br>

<input type="text" id="imgInput" placeholder="Paste image URL here">

<h3>📊 Logs</h3>
<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>

let files = [];
let index = 0;
let images = [];
let cacheKey = "rkp_cache";

const log = (msg)=>{
  document.getElementById("log").innerHTML += msg+"<br>";
};

function saveCache(){
  localStorage.setItem(cacheKey, JSON.stringify({
    files: files.map(f=>f.name),
    index,
    images,
    time: Date.now()
  }));
}

function loadCache(){
  let data = localStorage.getItem(cacheKey);
  if(!data) return;

  let obj = JSON.parse(data);

  // expire 7 days
  if(Date.now() - obj.time > 7*24*60*60*1000){
    localStorage.removeItem(cacheKey);
    return;
  }

  index = obj.index;
  images = obj.images;

  log("♻️ Cache restored");
}

loadCache();

document.getElementById("files").onchange = function(e){
  files = Array.from(e.target.files);
  index = 0;
  images = [];
  nextFile();
};

function cleanName(name){
  return name.replace(/\.[^/.]+$/, "");
}

function nextFile(){

  if(index >= files.length){
    log("📦 Creating ZIP...");
    createZip();
    return;
  }

  let name = cleanName(files[index].name);

  log("🔍 Searching: " + name);

  let search = encodeURIComponent(name + " official cover photo");

  setTimeout(()=>{
    window.open("https://www.google.com/search?tbm=isch&q="+search, "_blank");
  },500);
}

// 🔥 AUTO SUBMIT ON PASTE
document.getElementById("imgInput").addEventListener("paste", function(e){

  setTimeout(()=>{
    let url = e.target.value;
    processImage(url);
  },200);

});

async function processImage(url){

  let name = cleanName(files[index].name);

  try{

    let finalURL = url;

    // Google imgres fix
    if(url.includes("imgres")){
      let u = new URL(url);
      finalURL = decodeURIComponent(u.searchParams.get("imgurl"));
      log("✅ Extracted imgurl");
    }

    // Base64
    if(finalURL.startsWith("data:image")){
      let arr = finalURL.split(',');
      let mime = arr[0].match(/:(.*?);/)[1];
      let bstr = atob(arr[1]);
      let n = bstr.length;
      let u8arr = new Uint8Array(n);

      while(n--) u8arr[n] = bstr.charCodeAt(n);

      images.push({name, blob:new Blob([u8arr], {type:mime})});

    } else {

      let res = await fetch(finalURL);
      let blob = await res.blob();

      if(blob.size < 1000) throw "bad image";

      images.push({name, blob});
    }

    log("✅ Added: " + name);

    index++;
    saveCache();

    document.getElementById("imgInput").value = "";

    nextFile();

  }catch(e){
    log("❌ Failed: " + name);
    alert("Retry kar bhai 😭");
  }
}

async function createZip(){

  if(images.length === 0){
    log("🚫 No images");
    return;
  }

  let zip = new JSZip();

  images.forEach(img=>{
    let ext = img.blob.type.split("/")[1] || "jpg";
    zip.file(img.name+"."+ext, img.blob);
  });

  let content = await zip.generateAsync({type:"blob"});

  let a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "RKP_Covers.zip";
  a.click();

  log("🎉 ZIP Download Ready!");

  localStorage.removeItem(cacheKey);
}

</script>

</body>
</html>
