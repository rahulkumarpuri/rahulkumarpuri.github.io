<!DOCTYPE html>
<html>
<head>
  <title>MP3 Cover Auto Adder PRO</title>
</head>
<body>

<h2>Upload MP3 Files</h2>
<input type="file" id="fileInput" multiple accept=".mp3" />
<button onclick="processFiles()">Process</button>

<script src="https://unpkg.com/browser-id3-writer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>

async function fetchImage(query) {
  try {
    // Proxy + DuckDuckGo image search
    let url = `https://duckduckgo.com/?q=${encodeURIComponent(query)}&iax=images&ia=images`;
    let res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    let text = await res.text();

    // Extract image URL (hacky but works 😏)
    let match = text.match(/"image":"(.*?)"/);
    if (!match) return null;

    return match[1].replace(/\\u002f/g, "/");

  } catch (e) {
    console.log("Image fetch error", e);
    return null;
  }
}

async function processFiles() {
  const files = document.getElementById("fileInput").files;
  const zip = new JSZip();

  for (let file of files) {

    let name = file.name.replace(".mp3", "");
    
    // hyphen ko space me convert
    let cleanName = name.replace(/-/g, " ");
    let query = cleanName + " Official Cover photo";

    console.log("Searching:", query);

    let imageUrl = await fetchImage(query);

    if (!imageUrl) {
      console.log("No image found:", file.name);
      continue;
    }

    // fetch image
    let imgRes = await fetch(imageUrl);
    let imgBuffer = await imgRes.arrayBuffer();

    // read audio
    let arrayBuffer = await file.arrayBuffer();

    // embed cover
    let writer = new ID3Writer(arrayBuffer);
    writer.setFrame('TIT2', cleanName)
          .setFrame('APIC', {
            type: 3,
            data: imgBuffer,
            description: 'Cover'
          });

    writer.addTag();

    let blob = writer.getBlob();

    // add to zip
    zip.file(file.name, blob);
  }

  // generate zip
  let content = await zip.generateAsync({ type: "blob" });

  let a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "updated_songs.zip";
  a.click();
}

</script>

</body>
</html>
