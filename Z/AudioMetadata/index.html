<!DOCTYPE html>
<html>
<head>
  <title>MP3 Cover Tool (iTunes Jugaad 😏)</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#111; color:#fff; }
    button { padding:10px; margin-top:10px; }
    #progressBar { width:100%; height:25px; background:#333; margin-top:10px; }
    #progress { height:100%; width:0%; background:#00ff88; }
    #log { margin-top:15px; height:200px; overflow:auto; background:#000; color:#0f0; padding:10px; font-size:12px; }
  </style>
</head>
<body>

<h2>🔥 MP3 Cover Auto Adder (WORKING VERSION)</h2>

<input type="file" id="fileInput" multiple accept=".mp3">
<br>
<button onclick="processFiles()">Start Processing</button>

<div id="progressBar"><div id="progress"></div></div>
<p id="status">Waiting...</p>

<div id="log"></div>

<script src="https://unpkg.com/browser-id3-writer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>

// LOG FUNCTION
function log(msg){
  let box = document.getElementById("log");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
}

// 🔥 iTunes Cover Fetch (Stable Jugaad)
async function getCover(query){
  try{
    let res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&limit=1`);
    let data = await res.json();

    if(!data.results.length){
      return null;
    }

    let url = data.results[0].artworkUrl100;

    // HD upgrade 😏
    return url.replace("100x100", "600x600");

  }catch(e){
    return null;
  }
}

async function processFiles(){

  let files = document.getElementById("fileInput").files;
  let total = files.length;

  if(!total){
    alert("Bhai file daal pehle 😭");
    return;
  }

  let zip = new JSZip();

  let done = 0, success = 0, fail = 0;

  document.getElementById("status").innerText = "Processing started...";

  for(let file of files){

    let name = file.name.replace(".mp3","");
    let clean = name.replace(/[_-]+/g," ");

    log("🔍 Searching: " + clean);

    try{

      let coverUrl = await getCover(clean);

      if(!coverUrl){
        log("❌ No cover found: " + file.name);
        fail++;
        done++;
        continue;
      }

      let imgRes = await fetch(coverUrl);
      let imgBuffer = await imgRes.arrayBuffer();

      let audioBuffer = await file.arrayBuffer();

      let writer = new ID3Writer(audioBuffer);

      writer.setFrame("TIT2", clean)
            .setFrame("APIC", {
              type: 3,
              data: imgBuffer,
              description: "cover"
            });

      writer.addTag();

      let blob = writer.getBlob();

      zip.file(file.name, blob);

      success++;
      log("✅ Success: " + file.name);

    }catch(err){
      fail++;
      log("💥 Error: " + file.name);
    }

    done++;

    // PROGRESS UPDATE
    let percent = Math.round((done / total) * 100);
    document.getElementById("progress").style.width = percent + "%";

    document.getElementById("status").innerText =
      `Done: ${done}/${total} | Success: ${success} | Failed: ${fail}`;
  }

  if(success === 0){
    log("🚫 Kuch bhi process nahi hua. ZIP cancel.");
    return;
  }

  log("📦 Creating ZIP...");

  let content = await zip.generateAsync({ type: "blob" });

  let a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "songs_with_cover.zip";
  a.click();

  log("🎉 DONE! Download started.");
  document.getElementById("status").innerText = "All Done ✅";
}

</script>

</body>
</html>
