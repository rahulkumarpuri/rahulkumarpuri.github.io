<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RKP Audio Cover Bot 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.container{
  width:420px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  padding:25px;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
  border:1px solid rgba(255,255,255,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:700;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

label{
  font-size:13px;
  opacity:0.8;
}

input[type="file"],
input[type="text"]{
  width:100%;
  margin-top:8px;
  margin-bottom:15px;
  padding:10px;
  border:none;
  outline:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00f5ff;
}

#log{
  margin-top:15px;
  height:180px;
  overflow:auto;
  padding:10px;
  background:#000;
  border-radius:10px;
  font-size:12px;
  box-shadow: inset 0 0 10px #00ff00;
  color:#0f0;
}

/* Scrollbar sexy bana */
#log::-webkit-scrollbar{
  width:6px;
}
#log::-webkit-scrollbar-thumb{
  background:#00f5ff;
  border-radius:10px;
}

.glow{
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #00f5ff;}
  to{ text-shadow:0 0 20px #ff00c8;}
}

</style>
</head>

<body>

<div class="container">

<h2 class="glow">🎵 RKP Cover Bot</h2>

<label>Select Audio Files</label>
<input type="file" id="files" multiple accept=".mp3">

<label>Paste Image URL</label>
<input type="text" id="imgInput" placeholder="Paste image link here...">

<button onclick="processImage()">🚀 Submit</button>

<div id="log"></div>

</div>

<script>

let files = [];
let index = 0;

const log = (msg) => {
  let logBox = document.getElementById("log");
  logBox.innerHTML += msg + "<br>";
  logBox.scrollTop = logBox.scrollHeight;
};

document.getElementById("files").onchange = function(e){
  files = Array.from(e.target.files);
  index = 0;
  nextFile();
};

function cleanName(name){
  return name.replace(/\.[^/.]+$/, "");
}

function nextFile(){

  if(index >= files.length){
    log("🎉 DONE ALL FILES");
    return;
  }

  let file = files[index];
  let name = cleanName(file.name);

  let search = encodeURIComponent(name + " official cover photo");

  log("🔍 Searching: " + name);

  setTimeout(()=>{
    window.open("https://www.google.com/search?tbm=isch&q=" + search, "_blank");
  },600);
}

async function processImage(){

  let url = document.getElementById("imgInput").value;

  if(!url){
    alert("URL daal bhai 😭");
    return;
  }

  let file = files[index];
  let name = cleanName(file.name);

  try{

    let finalURL = url;

    if(url.includes("imgres")){
      let u = new URL(url);
      finalURL = decodeURIComponent(u.searchParams.get("imgurl"));
      log("✅ Extracted imgurl");
    }

    if(finalURL.startsWith("data:image")){
      log("⚡ Base64 detected");

      let arr = finalURL.split(',');
      let mime = arr[0].match(/:(.*?);/)[1];
      let bstr = atob(arr[1]);
      let n = bstr.length;
      let u8arr = new Uint8Array(n);

      while(n--){
        u8arr[n] = bstr.charCodeAt(n);
      }

      let blob = new Blob([u8arr], {type:mime});
      downloadBlob(blob, name);
      return;
    }

    let res = await fetch(finalURL);
    let blob = await res.blob();

    if(blob.size < 1000){
      throw "Invalid image";
    }

    downloadBlob(blob, name);

  }catch(e){
    log("❌ Failed: " + name);
    alert("Retry karo bhai 😭");
  }
}

function downloadBlob(blob, name){

  let ext = blob.type.split("/")[1] || "jpg";

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + "." + ext;
  a.click();

  log("✅ Downloaded: " + name);

  index++;
  document.getElementById("imgInput").value = "";

  setTimeout(()=>{
    nextFile();
  },1000);
}

</script>

</body>
</html>
