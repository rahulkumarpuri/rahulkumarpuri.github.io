<!DOCTYPE html>
<html>
<head>
  <title>MP3 Cover Tool PRO</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #progressBar {
      width: 100%;
      height: 25px;
      background: #ddd;
      margin-top: 10px;
    }
    #progress {
      height: 100%;
      width: 0%;
      background: green;
    }
    #log {
      margin-top: 15px;
      height: 200px;
      overflow: auto;
      background: #111;
      color: #0f0;
      padding: 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<h2>MP3 Cover Adder PRO</h2>

<input type="file" id="fileInput" multiple accept=".mp3" />
<button onclick="processFiles()">Start</button>

<div id="progressBar">
  <div id="progress"></div>
</div>

<p id="status">Waiting...</p>

<div id="log"></div>

<script src="https://unpkg.com/browser-id3-writer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>

function log(msg) {
  let logBox = document.getElementById("log");
  logBox.innerHTML += msg + "<br>";
  logBox.scrollTop = logBox.scrollHeight;
}

async function fetchImage(query) {
  try {
    let url = `https://duckduckgo.com/?q=${encodeURIComponent(query)}&iax=images&ia=images`;
    let res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    let text = await res.text();

    let match = text.match(/"image":"(.*?)"/);
    if (!match) return null;

    return match[1].replace(/\\u002f/g, "/");

  } catch (e) {
    return null;
  }
}

async function processFiles() {

  const files = document.getElementById("fileInput").files;
  const total = files.length;

  if (!total) {
    alert("Kuch files to daal bhai 😭");
    return;
  }

  const zip = new JSZip();
  let done = 0;
  let success = 0;
  let failed = 0;

  document.getElementById("status").innerText = "Processing started...";

  for (let file of files) {

    let name = file.name.replace(".mp3", "");
    let cleanName = name.replace(/-/g, " ");
    let query = cleanName + " Official Cover photo";

    log("🔍 Searching: " + query);

    try {
      let imageUrl = await fetchImage(query);

      if (!imageUrl) {
        log("❌ No image: " + file.name);
        failed++;
        continue;
      }

      let imgRes = await fetch(imageUrl);
      let imgBuffer = await imgRes.arrayBuffer();

      let arrayBuffer = await file.arrayBuffer();

      let writer = new ID3Writer(arrayBuffer);
      writer.setFrame('TIT2', cleanName)
            .setFrame('APIC', {
              type: 3,
              data: imgBuffer,
              description: 'Cover'
            });

      writer.addTag();

      let blob = writer.getBlob();
      zip.file(file.name, blob);

      success++;
      log("✅ Done: " + file.name);

    } catch (err) {
      failed++;
      log("❌ Error: " + file.name);
    }

    done++;

    // update progress
    let percent = Math.round((done / total) * 100);
    document.getElementById("progress").style.width = percent + "%";
    document.getElementById("status").innerText =
      `Done: ${done}/${total} | Success: ${success} | Failed: ${failed}`;
  }

  log("📦 Creating ZIP...");

  try {
    let content = await zip.generateAsync({ type: "blob" });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "updated_songs.zip";
    a.click();

    log("🎉 ZIP Download Ready!");
    document.getElementById("status").innerText = "All Done ✅";

  } catch (e) {
    log("💥 ZIP failed!");
  }
}

</script>

</body>
</html>
