<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RKP Audio Cover Bot 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  padding:10px;
}

.container{
  width:100%;
  max-width:520px;
  min-height:95vh;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
  display:flex;
  flex-direction:column;
}

h2{
  text-align:center;
  margin-bottom:10px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

#counter{
  text-align:center;
  font-size:13px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.05);
  padding:6px;
  border-radius:8px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
  margin-top:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  color:white;
}

#log{
  margin-top:10px;
  flex-grow:1;
  overflow:auto;
  padding:10px;
  background:#000;
  border-radius:12px;
  font-size:12px;
  color:#0f0;
}

</style>
</head>

<body>

<div class="container">

<h2>🎵 RKP Cover Bot</h2>

<div id="counter">No files loaded 😴</div>

<input type="file" id="fileInput" accept=".mp3" multiple>

<button id="addBtn">➕ Upload Selected Files</button>
<button id="runBtn">🚀 Skip Uploading & Run</button>

<input type="text" id="imgInput" placeholder="Paste image URL">

<button onclick="processImage()">⬇️ Download Cover</button>

<div id="log"></div>

</div>

<script>

let fileNames = [];
let index = 0;

/* LOG */
function log(msg){
  let box=document.getElementById("log");
  box.innerHTML+=msg+"<br>";
  box.scrollTop=box.scrollHeight;
}

/* CLEAN */
function clean(name){
  return name.replace(/\.[^/.]+$/,"");
}

/* COUNTER */
function updateCounter(){
  let total=fileNames.length;
  let remain=total-index;

  document.getElementById("counter").innerText=
    `${total} Files loaded | ${index} completed | ${remain} remaining`;
}

/* ADD MULTIPLE FILES 🔥 */
document.getElementById("addBtn").onclick=function(){

  let input=document.getElementById("fileInput");

  if(input.files.length===0){
    alert("file select kar bhai 😏");
    return;
  }

  for(let f of input.files){
    let name=clean(f.name);

    if(!fileNames.includes(name)){ // duplicate avoid
      fileNames.push(name);
      log("➕ Added: "+name);
    }
  }

  updateCounter();
  input.value="";
};

/* RUN */
document.getElementById("runBtn").onclick=function(){

  if(fileNames.length===0){
    alert("kuch to upload kar le bhai 💀");
    return;
  }

  localStorage.setItem("rkp_names",JSON.stringify(fileNames));
  localStorage.setItem("rkp_index",index);

  next();
};

/* LOAD CACHE */
function loadCache(){

  let saved=localStorage.getItem("rkp_names");

  if(saved){
    fileNames=JSON.parse(saved);
    index=parseInt(localStorage.getItem("rkp_index"))||0;

    log("♻️ Restored session");
    updateCounter();
  }
}

/* NEXT (AUTO REDIRECT SAME TAB) */
function next(){

  if(index>=fileNames.length){
    log("🎉 DONE");
    return;
  }

  let name=fileNames[index];

  let search=encodeURIComponent(name+" album cover");

  log("🔍 "+name);

  window.location.href="https://www.google.com/search?tbm=isch&q="+search;
}

/* DOWNLOAD */
async function processImage(){

  let url=document.getElementById("imgInput").value;

  if(!url){
    alert("URL daal 😏");
    return;
  }

  let name=fileNames[index];

  let res=await fetch(url);
  let blob=await res.blob();

  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name+".jpg";
  a.click();

  log("✅ Saved: "+name);

  index++;
  localStorage.setItem("rkp_index",index);

  updateCounter();

  setTimeout(next,800);
}

/* INIT */
window.onload=loadCache;

</script>

</body>
</html>
