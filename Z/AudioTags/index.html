<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RKP File Collector 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  padding:10px;
}

.container{
  width:100%;
  max-width:500px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
}

h2{
  text-align:center;
  margin-bottom:15px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  color:white;
  font-weight:600;
  cursor:pointer;
}

textarea{
  width:100%;
  height:120px;
  margin-top:10px;
  border-radius:12px;
  padding:10px;
  background:#000;
  color:#0f0;
  border:none;
}

#counter{
  text-align:center;
  margin-bottom:10px;
  font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h2>🎵 RKP File Collector</h2>

<div id="counter">0 files added</div>

<!-- 🔥 FILE INPUT (AUTO ADD) -->
<input type="file" id="fileInput" multiple accept=".mp3">

<button onclick="generateJSON()">🚀 Skip Uploading & Generate JSON</button>

<textarea id="jsonBox" placeholder="JSON will appear here..."></textarea>

<button onclick="copyJSON()">📋 Copy JSON & Go Next</button>

</div>

<script>

let fileNames = [];

/* CLEAN */
function clean(name){
  return name.replace(/\.[^/.]+$/,"");
}

/* 🔥 AUTO ADD ON SELECT */
document.getElementById("fileInput").onchange = function(e){

  let files = Array.from(e.target.files);

  if(files.length === 0) return;

  for(let f of files){
    let name = clean(f.name);

    if(!fileNames.includes(name)){
      fileNames.push(name);
    }
  }

  document.getElementById("counter").innerText =
    fileNames.length + " files added";

  this.value = ""; // reset so same file dubara select ho sake 😏
};

/* GENERATE JSON */
function generateJSON(){

  if(fileNames.length === 0){
    alert("kuch to upload kar 💀");
    return;
  }

  let json = JSON.stringify({
    files: fileNames
  }, null, 2);

  document.getElementById("jsonBox").value = json;

  let blob = new Blob([json], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "files.json";
  a.click();
}

/* COPY + REDIRECT */
function copyJSON(){

  let text = document.getElementById("jsonBox").value;

  if(!text){
    alert("pehle JSON generate kar 😏");
    return;
  }

  navigator.clipboard.writeText(text).then(()=>{
    alert("Copied bro 😎");
    window.location.href = "download.html";
  });

}

</script>

</body>
</html>
