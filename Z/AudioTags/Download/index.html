<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RKP Cover Engine 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  padding:10px;
}

.container{
  width:100%;
  max-width:520px;
  min-height:95vh;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
  display:flex;
  flex-direction:column;
}

h2{
  text-align:center;
  margin-bottom:10px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

textarea{
  width:100%;
  height:120px;
  border-radius:12px;
  padding:10px;
  background:#000;
  color:#0f0;
  border:none;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  color:white;
  font-weight:600;
  cursor:pointer;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
  margin-top:8px;
}

#counter{
  text-align:center;
  margin:10px 0;
  font-size:13px;
}

#log{
  margin-top:10px;
  flex-grow:1;
  overflow:auto;
  padding:10px;
  background:#000;
  border-radius:12px;
  font-size:12px;
  color:#0f0;
}

</style>
</head>

<body>

<div class="container">

<h2>🚀 Cover Engine</h2>

<textarea id="jsonInput" placeholder="Paste JSON here..."></textarea>

<button onclick="loadJSON()">📥 Load JSON</button>

<div id="counter">No data loaded 😴</div>

<input type="text" id="imgInput" placeholder="Paste image URL">

<button onclick="downloadImage()">⬇️ Download Cover</button>

<div id="log"></div>

</div>

<script>

let files = [];
let index = 0;

/* LOG */
function log(msg){
  let box = document.getElementById("log");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
}

/* COUNTER */
function updateCounter(){
  let total = files.length;
  let remain = total - index;

  document.getElementById("counter").innerText =
    `${total} Files | ${index} done | ${remain} left`;
}

/* LOAD JSON */
function loadJSON(){

  try{
    let data = JSON.parse(document.getElementById("jsonInput").value);

    files = data.files || [];
    index = 0;

    localStorage.setItem("engine_files", JSON.stringify(files));
    localStorage.setItem("engine_index", index);

    log("✅ JSON loaded");
    updateCounter();

    next();

  }catch(e){
    alert("invalid JSON bhai 💀");
  }
}

/* RESTORE */
function restore(){

  let f = localStorage.getItem("engine_files");

  if(f){
    files = JSON.parse(f);
    index = parseInt(localStorage.getItem("engine_index")) || 0;

    log("♻️ session restored");
    updateCounter();
  }
}

/* NEXT SEARCH */
function next(){

  if(index >= files.length){
    log("🎉 DONE ALL");
    return;
  }

  let name = files[index];
  let search = encodeURIComponent(name + " album cover");

  log("🔍 " + name);

  window.location.href =
    "https://www.google.com/search?tbm=isch&q=" + search;
}

/* DOWNLOAD */
async function downloadImage(){

  let url = document.getElementById("imgInput").value;

  if(!url){
    alert("URL daal 😏");
    return;
  }

  let name = files[index];

  let res = await fetch(url);
  let blob = await res.blob();

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".jpg";
  a.click();

  log("✅ saved: " + name);

  index++;

  localStorage.setItem("engine_index", index);

  updateCounter();

  document.getElementById("imgInput").value = "";

  setTimeout(next, 800);
}

/* INIT */
window.onload = restore;

</script>

</body>
</html>
