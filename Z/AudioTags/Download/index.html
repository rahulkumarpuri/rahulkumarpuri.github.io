<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RKP Cover Engine 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  padding:10px;
}

.container{
  width:100%;
  max-width:520px;
  min-height:95vh;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
  display:flex;
  flex-direction:column;
}

h2{
  text-align:center;
  margin-bottom:10px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

textarea{
  width:100%;
  height:120px;
  border-radius:12px;
  padding:10px;
  background:#000;
  color:#0f0;
  border:none;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
  margin-top:8px;
}

#counter{
  text-align:center;
  margin:10px 0;
  font-size:13px;
}

#log{
  margin-top:10px;
  flex-grow:1;
  overflow:auto;
  padding:10px;
  background:#000;
  border-radius:12px;
  font-size:12px;
  color:#0f0;
}

#preview{
  width:100%;
  margin-top:10px;
  border-radius:10px;
  display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>🚀 Cover Engine</h2>

<textarea id="jsonInput" placeholder='{"files":["song1","song2"]}'></textarea>

<button onclick="loadJSON()">📥 Load JSON</button>

<div id="counter">No data loaded 😴</div>

<input type="text" id="imgInput" placeholder="Paste image URL">

<img id="preview">

<button id="downloadBtn" onclick="downloadImage()">⬇️ Download Cover</button>

<button onclick="resetAll()">♻️ Reset</button>

<div id="log"></div>

</div>

<script>

let files = [];
let index = 0;
let isDownloading = false;

/* LOG */
function log(msg){
  let box = document.getElementById("log");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
}

/* COUNTER */
function updateCounter(){
  let total = files.length;
  let remain = total - index;

  document.getElementById("counter").innerText =
    `${total} Files | ${index} done | ${remain} left`;
}

/* EXTRACT REAL IMAGE URL */
function extractRealURL(url){
  try{
    if(url.includes("google.com/imgres")){
      let u = new URL(url);
      let real = u.searchParams.get("imgurl");
      return decodeURIComponent(real);
    }
    return url;
  }catch(e){
    return url;
  }
}

/* LOAD JSON */
function loadJSON(){
  try{
    let data = JSON.parse(document.getElementById("jsonInput").value);

    if(!data.files || !Array.isArray(data.files)){
      alert("Proper JSON daal bhai 😑");
      return;
    }

    files = data.files;
    index = 0;

    saveState();

    log("✅ JSON loaded");
    updateCounter();

    next();

  }catch(e){
    alert("Invalid JSON 💀");
  }
}

/* SAVE STATE */
function saveState(){
  localStorage.setItem("engine_files", JSON.stringify(files));
  localStorage.setItem("engine_index", index);
}

/* RESTORE */
function restore(){
  try{
    let f = localStorage.getItem("engine_files");

    if(f){
      files = JSON.parse(f);
      index = parseInt(localStorage.getItem("engine_index")) || 0;

      if(index >= files.length){
        index = 0;
      }

      log("♻️ Session restored");
      updateCounter();
    }

  }catch(e){
    localStorage.clear();
    log("⚠️ Cache reset");
  }
}

/* NEXT SEARCH */
function next(){

  if(!files.length){
    log("⚠️ No files loaded");
    return;
  }

  if(index >= files.length){
    log("🎉 DONE ALL");
    return;
  }

  let name = files[index];
  let search = encodeURIComponent(name + " album cover");

  log("🔍 Searching: " + name);

  window.open(
    "https://www.google.com/search?tbm=isch&q=" + search,
    "_blank"
  );
}

/* DOWNLOAD */
async function downloadImage(){

  if(isDownloading) return;

  let btn = document.getElementById("downloadBtn");
  btn.disabled = true;
  isDownloading = true;

  let url = document.getElementById("imgInput").value;

  if(!url){
    alert("URL daal bhai 😏");
    btn.disabled = false;
    isDownloading = false;
    return;
  }

  // 🔥 FIX
  url = extractRealURL(url);

  let name = files[index];

  try{

    log("⏳ Downloading...");

    let res = await fetch(url);

    if(!res.ok) throw new Error();

    let blob = await res.blob();

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name + ".jpg";
    a.click();

    log("✅ Saved: " + name);

    index++;
    saveState();
    updateCounter();

    document.getElementById("imgInput").value = "";
    document.getElementById("preview").style.display = "none";

    setTimeout(next, 500);

  }catch(e){
    alert("❌ Download failed 😑 (CORS ya invalid link)");
  }

  btn.disabled = false;
  isDownloading = false;
}

/* PREVIEW */
document.getElementById("imgInput").addEventListener("input", e=>{
  let img = document.getElementById("preview");

  let url = extractRealURL(e.target.value);

  if(url){
    img.src = url;
    img.style.display = "block";
  }else{
    img.style.display = "none";
  }
});

/* RESET */
function resetAll(){
  localStorage.clear();
  files = [];
  index = 0;
  updateCounter();
  log("🧹 Reset done");
}

/* INIT */
window.onload = () => {
  restore();

  if(files.length && index < files.length){
    log("▶️ Ready from " + index);
  }
};

</script>

</body>
</html>
