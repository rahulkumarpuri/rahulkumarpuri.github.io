<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Audio Cover Tool 😎</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-id3-writer"></script>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.2/dist/ffmpeg.min.js"></script>
</head>

<body>

<h2>🔥 Ultimate ZIP Audio Tool</h2>

<input id="zipName" placeholder="Enter ZIP Name"/>
<button onclick="createZip()">Create ZIP</button>

<div id="zipContainer"></div>

<hr>

<h3>Upload Images (All at once)</h3>
<input type="file" id="images" multiple>

<br><br>
<button onclick="runProcess()">🚀 RUN</button>

<h3>Downloads</h3>
<div id="downloads"></div>

<script>
let audioFiles = {};
let imageMap = {};

const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: false });

// ================= ZIP CREATE =================
function createZip() {
  let name = document.getElementById("zipName").value;
  audioFiles[name] = [];

  let div = document.createElement("div");
  div.innerHTML = `
    <h4>${name}</h4>
    <input type="file" multiple onchange="uploadAudio(event, '${name}')">
  `;
  document.getElementById("zipContainer").appendChild(div);
}

// ================= AUDIO UPLOAD =================
function uploadAudio(e, zip) {
  for (let file of e.target.files) {
    audioFiles[zip].push(file);
  }
}

// ================= CLEAN NAME =================
function cleanName(name) {
  return name
    .toLowerCase()
    .replace(/\.[^/.]+$/, "")
    .replace(/\(\d+\)/g, "")
    .replace(/[^a-z0-9\u4e00-\u9fa5]/gi, "")
    .trim();
}

// ================= SIMILARITY =================
function levenshtein(a, b) {
  let matrix = [];

  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b[i - 1] === a[j - 1]) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }

  return matrix[b.length][a.length];
}

function similarity(a, b) {
  let dist = levenshtein(a, b);
  let max = Math.max(a.length, b.length);
  return 1 - dist / max;
}

// ================= MATCH =================
function findBestMatch(audioName) {
  let cleanAudio = cleanName(audioName);
  let best = null;
  let score = 0;

  for (let img in imageMap) {
    let s = similarity(cleanAudio, cleanName(img));
    if (s > score) {
      score = s;
      best = img;
    }
  }

  return score >= 0.9 ? best : null;
}

// ================= IMAGE CONVERT =================
async function convertToJpeg(file) {
  return new Promise(resolve => {
    let img = new Image();
    let reader = new FileReader();

    reader.onload = () => img.src = reader.result;

    img.onload = () => {
      let canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      let ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.9);
    };

    reader.readAsDataURL(file);
  });
}

// ================= LOAD IMAGES =================
async function prepareImages() {
  let files = document.getElementById("images").files;

  for (let file of files) {
    let base = file.name;
    let jpeg = await convertToJpeg(file);
    imageMap[base] = jpeg;
  }
}

// ================= AUDIO CONVERT =================
async function convertToMp3(file) {
  if (file.name.toLowerCase().endsWith(".mp3")) return file;

  if (!ffmpeg.isLoaded()) await ffmpeg.load();

  const input = "input";
  const output = "output.mp3";

  ffmpeg.FS("writeFile", input, await fetchFile(file));
  await ffmpeg.run("-i", input, output);

  const data = ffmpeg.FS("readFile", output);

  return new Blob([data.buffer], { type: "audio/mp3" });
}

// ================= ADD COVER =================
async function addCover(mp3File, imageBlob) {
  let buffer = await mp3File.arrayBuffer();
  let writer = new ID3Writer(buffer);

  let imgBuffer = await imageBlob.arrayBuffer();

  writer.setFrame("APIC", {
    type: 3,
    data: new Uint8Array(imgBuffer),
    description: "cover"
  });

  writer.addTag();
  return writer.getBlob();
}

// ================= MAIN PROCESS =================
async function runProcess() {
  await prepareImages();

  let downloadsDiv = document.getElementById("downloads");
  downloadsDiv.innerHTML = "";

  let failed = [];

  for (let zipName in audioFiles) {
    let zip = new JSZip();

    for (let file of audioFiles[zipName]) {
      try {
        let mp3 = await convertToMp3(file);

        let match = findBestMatch(file.name);

        let finalFile = mp3;

        if (match) {
          finalFile = await addCover(mp3, imageMap[match]);
        }

        zip.file(file.name.replace(/\.[^/.]+$/, ".mp3"), finalFile);

      } catch (e) {
        console.log("Failed:", file.name);
        failed.push(file.name);
      }
    }

    let content = await zip.generateAsync({ type: "blob" });
    let url = URL.createObjectURL(content);

    let a = document.createElement("a");
    a.href = url;
    a.download = zipName + ".zip";
    a.innerText = "Download " + zipName;

    downloadsDiv.appendChild(a);
    downloadsDiv.appendChild(document.createElement("br"));
  }

  if (failed.length) {
    let div = document.createElement("div");
    div.innerHTML = "<h4>⚠ Failed Files</h4>" + failed.join("<br>");
    downloadsDiv.appendChild(div);
  }
}
</script>

</body>
</html>
