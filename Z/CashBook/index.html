<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashBook</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.balance{
background:linear-gradient(135deg,#16a34a,#22c55e);
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

.balance h2{
font-size:35px;
margin-top:10px;
}

.form-box{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
outline:none;
border-radius:10px;
background:#334155;
color:white;
}

textarea{
resize:none;
height:80px;
}

.btns{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.income-btn{
background:#16a34a;
color:white;
}

.short-btn{
background:#dc2626;
color:white;
}

.clear-btn{
background:#475569;
color:white;
margin-top:10px;
width:100%;
}

.history{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.history h2{
margin-bottom:15px;
}

.entry{
padding:15px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.income{
background:rgba(22,163,74,.2);
border-left:5px solid #22c55e;
}

.short{
background:rgba(220,38,38,.2);
border-left:5px solid #ef4444;
}

.left{
max-width:70%;
}

.note{
font-size:13px;
color:#cbd5e1;
margin-top:5px;
}

.date{
font-size:12px;
color:#94a3b8;
}

.amount{
font-size:20px;
font-weight:bold;
}

.plus{
color:#22c55e;
}

.minus{
color:#ef4444;
}

.empty{
text-align:center;
color:#94a3b8;
padding:20px;
}
</style>
</head>
<body>

<div class="container">

<h1>💰 CashBook</h1>

<div class="balance">
<p>Total Balance</p>
<h2 id="balance">₹0</h2>
</div>

<div class="form-box">

<input type="number" id="amount" placeholder="Enter Amount">

<textarea id="note" placeholder="Additional Note"></textarea>

<input type="date" id="date">

<div class="btns">
<button class="income-btn" onclick="addEntry('income')">
+ Income
</button>

<button class="short-btn" onclick="addEntry('short')">
- Short
</button>
</div>

<button class="clear-btn" onclick="clearAll()">
Delete All History
</button>

</div>

<div class="history">
<h2>📜 History</h2>
<div id="history"></div>
</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("cashbook")) || [];

document.getElementById("date").value =
new Date().toISOString().split("T")[0];

function addEntry(type){

let amount = Number(document.getElementById("amount").value);
let note = document.getElementById("note").value;
let date = document.getElementById("date").value;

if(!amount){
alert("Enter Amount");
return;
}

entries.push({
type,
amount,
note,
date
});

localStorage.setItem("cashbook",JSON.stringify(entries));

document.getElementById("amount").value="";
document.getElementById("note").value="";

render();
}

function render(){

let history = document.getElementById("history");

if(entries.length===0){
history.innerHTML =
'<div class="empty">No Records Found</div>';
document.getElementById("balance").innerHTML="₹0";
return;
}

let balance = 0;

entries.forEach(item=>{
if(item.type==="income"){
balance += item.amount;
}else{
balance -= item.amount;
}
});

document.getElementById("balance").innerHTML =
"₹"+balance;

history.innerHTML = "";

[...entries].reverse().forEach(item=>{

history.innerHTML += `
<div class="entry ${item.type}">
<div class="left">
<div><b>${item.type.toUpperCase()}</b></div>
<div class="note">${item.note || "No Note"}</div>
<div class="date">${item.date}</div>
</div>

<div class="amount ${
item.type==="income"
? "plus"
: "minus"
}">
${item.type==="income" ? "+" : "-"}₹${item.amount}
</div>
</div>
`;

});

}

function clearAll(){

if(confirm("Delete all history?")){
entries = [];
localStorage.removeItem("cashbook");
render();
}

}

render();

</script>

</body>
</html>
